  <circle cx="445" cy="280" r="6" fill="#7a7a60" stroke="#a0a080" stroke-width="1.5"/>
  <circle cx="445" cy="310" r="6" fill="#7a7a60" stroke="#a0a080" stroke-width="1.5"/>
