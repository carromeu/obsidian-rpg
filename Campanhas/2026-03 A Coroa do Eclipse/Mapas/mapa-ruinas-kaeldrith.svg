<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 850" font-family="'Segoe UI', Tahoma, sans-serif">
  <defs><filter id="ds"><feDropShadow dx="2" dy="2" stdDeviation="3" flood-color="#0a0a0a" flood-opacity="0.5"/></filter></defs>
  <rect width="700" height="850" fill="#2a2a22" rx="8"/>
  <rect x="130" y="10" width="440" height="48" rx="6" fill="#3a3020" stroke="#8a7a50" stroke-width="2"/>
