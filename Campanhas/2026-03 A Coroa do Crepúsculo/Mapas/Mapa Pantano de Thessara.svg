<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" width="800" height="550">
  <defs>
    <filter id="shadow"><feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#1a2a1a" flood-opacity="0.4"/></filter>
    <radialGradient id="fogGrad" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#e8e0d8" stop-opacity="0"/><stop offset="70%" stop-color="#c0c8b0" stop-opacity="0.15"/><stop offset="100%" stop-color="#90a080" stop-opacity="0.25"/>
    </radialGradient>
    <radialGradient id="greenSmoke" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#40a040" stop-opacity="0.15"/><stop offset="100%" stop-color="#40a040" stop-opacity="0"/>
    </radialGradient>
    <pattern id="swampWater" patternUnits="userSpaceOnUse" width="30" height="30">
      <rect width="30" height="30" fill="#2a3a2a"/>
      <path d="M 0,15 Q 7,12 15,15 Q 22,18 30,15" stroke="#3a4a3a" stroke-width="0.5" fill="none" opacity="0.3"/>
    </pattern>
    <pattern id="mud" patternUnits="userSpaceOnUse" width="20" height="20">
      <rect width="20" height="20" fill="#5a4a30"/>
      <circle cx="5" cy="8" r="1" fill="#4a3a20" opacity="0.3"/><circle cx="15" cy="4" r="0.8" fill="#4a3a20" opacity="0.3"/><circle cx="10" cy="16" r="1.2" fill="#4a3a20" opacity="0.3"/>
    </pattern>
  </defs>
  <!-- Background - swamp -->
  <rect width="800" height="550" fill="#3a4a30"/>
  <rect width="800" height="550" fill="url(#swampWater)" opacity="0.4"/>
  <!-- Border -->
  <rect x="0" y="0" width="800" height="550" fill="none" stroke="#4a5a30" stroke-width="8"/>
  <rect x="4" y="4" width="792" height="542" fill="none" stroke="#6a7a50" stroke-width="1"/>
  <!-- Title -->
  <rect x="220" y="10" width="360" height="38" rx="3" fill="#2a1a10" opacity="0.92"/>
  <rect x="222" y="12" width="356" height="34" rx="2" fill="none" stroke="#6a8a40" stroke-width="0.8"/>
  <text x="400" y="33" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#c0e0a0" font-weight="bold" letter-spacing="2">PANTANO DE THESSARA</text>
  <text x="400" y="42" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#8aaa60" letter-spacing="1">ATO 2 — CENA 2.3 — A BRUXA DO PANTANO</text>

  <!-- WATER POOLS -->
  <g opacity="0.5">
    <ellipse cx="150" cy="200" rx="80" ry="40" fill="#2a3a2a" stroke="#3a4a3a" stroke-width="1"/>
    <ellipse cx="600" cy="180" rx="60" ry="35" fill="#2a3a2a" stroke="#3a4a3a" stroke-width="1"/>
    <ellipse cx="350" cy="400" rx="90" ry="45" fill="#2a3a2a" stroke="#3a4a3a" stroke-width="1"/>
    <ellipse cx="680" cy="380" rx="70" ry="35" fill="#2a3a2a" stroke="#3a4a3a" stroke-width="1"/>
    <ellipse cx="100" cy="420" rx="50" ry="30" fill="#2a3a2a" stroke="#3a4a3a" stroke-width="1"/>
    <ellipse cx="500" cy="300" rx="40" ry="20" fill="#2a3a2a" stroke="#3a4a3a" stroke-width="1"/>
  </g>

  <!-- MUD PATHS (walkable root bridges) -->
  <g opacity="0.6">
    <!-- Path from east -->
    <path d="M 780,280 Q 700,270 620,280 Q 560,290 500,280 Q 450,270 420,260" stroke="#6a5a40" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Path to cabin -->
    <path d="M 420,260 Q 400,250 380,250 Q 350,255 330,270 Q 310,290 320,310" stroke="#6a5a40" stroke-width="7" fill="none" stroke-linecap="round"/>
    <!-- Side path -->
    <path d="M 420,260 Q 430,310 420,360" stroke="#5a4a30" stroke-width="5" fill="none" stroke-linecap="round" stroke-dasharray="6,4"/>
  </g>
  <text x="720" y="270" font-family="Georgia, serif" font-size="8" fill="#8a7a50" font-style="italic">← Da floresta</text>

  <!-- SWAMP VEGETATION -->
  <!-- Reed groups -->
  <g stroke="#4a6a30" stroke-width="1" opacity="0.6">
    <g transform="translate(120,180)"><line x1="0" y1="5" x2="-3" y2="-10"/><line x1="3" y1="5" x2="5" y2="-12"/><line x1="6" y1="5" x2="4" y2="-8"/></g>
    <g transform="translate(180,220)"><line x1="0" y1="5" x2="-2" y2="-10"/><line x1="3" y1="5" x2="4" y2="-11"/><line x1="6" y1="5" x2="5" y2="-9"/></g>
    <g transform="translate(560,170)"><line x1="0" y1="5" x2="-3" y2="-10"/><line x1="3" y1="5" x2="5" y2="-12"/></g>
    <g transform="translate(640,195)"><line x1="0" y1="5" x2="-2" y2="-10"/><line x1="3" y1="5" x2="4" y2="-11"/><line x1="6" y1="5" x2="5" y2="-9"/></g>
    <g transform="translate(310,410)"><line x1="0" y1="5" x2="-3" y2="-10"/><line x1="3" y1="5" x2="5" y2="-12"/><line x1="6" y1="5" x2="4" y2="-8"/></g>
    <g transform="translate(400,420)"><line x1="0" y1="5" x2="-2" y2="-10"/><line x1="3" y1="5" x2="4" y2="-11"/></g>
    <g transform="translate(650,370)"><line x1="0" y1="5" x2="-3" y2="-10"/><line x1="3" y1="5" x2="5" y2="-12"/><line x1="6" y1="5" x2="4" y2="-8"/></g>
    <g transform="translate(720,395)"><line x1="0" y1="5" x2="-2" y2="-10"/><line x1="3" y1="5" x2="4" y2="-11"/></g>
    <g transform="translate(80,400)"><line x1="0" y1="5" x2="-3" y2="-10"/><line x1="3" y1="5" x2="5" y2="-12"/></g>
    <g transform="translate(130,440)"><line x1="0" y1="5" x2="-2" y2="-10"/><line x1="3" y1="5" x2="4" y2="-11"/><line x1="6" y1="5" x2="5" y2="-9"/></g>
    <g transform="translate(480,290)"><line x1="0" y1="5" x2="-3" y2="-10"/><line x1="3" y1="5" x2="5" y2="-12"/></g>
    <g transform="translate(530,310)"><line x1="0" y1="5" x2="-2" y2="-10"/><line x1="3" y1="5" x2="4" y2="-11"/><line x1="6" y1="5" x2="5" y2="-9"/></g>
  </g>

  <!-- Dead trees in swamp -->
  <g opacity="0.5" stroke="#4a3a20" fill="none">
    <g transform="translate(200,150)"><line x1="0" y1="10" x2="0" y2="-15" stroke-width="2"/><line x1="0" y1="-5" x2="-8" y2="-18" stroke-width="1.2"/><line x1="0" y1="-8" x2="6" y2="-20" stroke-width="1.2"/></g>
    <g transform="translate(550,140)"><line x1="0" y1="10" x2="0" y2="-12" stroke-width="2"/><line x1="0" y1="-4" x2="-6" y2="-15" stroke-width="1"/><line x1="0" y1="-6" x2="5" y2="-16" stroke-width="1"/></g>
    <g transform="translate(450,380)"><line x1="0" y1="10" x2="0" y2="-14" stroke-width="2"/><line x1="0" y1="-5" x2="-7" y2="-16" stroke-width="1.2"/></g>
    <g transform="translate(250,350)"><line x1="0" y1="10" x2="0" y2="-10" stroke-width="1.5"/><line x1="0" y1="-3" x2="5" y2="-12" stroke-width="1"/></g>
    <g transform="translate(700,340)"><line x1="0" y1="10" x2="0" y2="-12" stroke-width="1.5"/><line x1="0" y1="-4" x2="-6" y2="-14" stroke-width="1"/></g>
  </g>

  <!-- Fog overlay -->
  <rect width="800" height="550" fill="url(#fogGrad)"/>

  <!-- THESSARA'S CABIN -->
  <g transform="translate(320,300)" filter="url(#shadow)">
    <!-- Green smoke around cabin -->
    <circle cx="0" cy="0" r="50" fill="url(#greenSmoke)"/>
    <!-- Stilts (root-like) -->
    <line x1="-18" y1="25" x2="-20" y2="5" stroke="#5a4a30" stroke-width="3"/><line x1="-18" y1="25" x2="-22" y2="30" stroke="#5a4a30" stroke-width="2"/>
    <line x1="18" y1="25" x2="20" y2="5" stroke="#5a4a30" stroke-width="3"/><line x1="18" y1="25" x2="22" y2="30" stroke="#5a4a30" stroke-width="2"/>
    <line x1="-8" y1="25" x2="-8" y2="8" stroke="#5a4a30" stroke-width="2.5"/>
    <line x1="8" y1="25" x2="8" y2="8" stroke="#5a4a30" stroke-width="2.5"/>
    <!-- Cabin body -->
    <rect x="-22" y="-12" width="44" height="20" rx="2" fill="#5a4a30" stroke="#3a2a10" stroke-width="1.5"/>
    <!-- Crooked roof -->
    <polygon points="-26,-12 0,-30 26,-12" fill="#3a3020" stroke="#2a2010" stroke-width="1"/>
    <!-- Crooked chimney -->
    <rect x="10" y="-35" width="7" height="12" fill="#4a3a20" stroke="#3a2a10" stroke-width="0.5" transform="rotate(5,14,-29)"/>
    <!-- Green smoke from chimney -->
    <path d="M 14,-35 Q 10,-45 16,-55 Q 12,-65 18,-75" stroke="#50a050" stroke-width="2" fill="none" opacity="0.4"/>
    <path d="M 16,-35 Q 20,-48 14,-58 Q 20,-68 15,-80" stroke="#40a040" stroke-width="1.5" fill="none" opacity="0.3"/>
    <!-- Door -->
    <rect x="-5" y="-2" width="10" height="10" rx="1" fill="#3a2a10" stroke="#2a1a05" stroke-width="0.5"/>
    <!-- Window (dim light) -->
    <rect x="-18" y="-8" width="8" height="6" rx="1" fill="#6a8a40" opacity="0.4" stroke="#4a5a20" stroke-width="0.5"/>
    <!-- Porch with rocking chair -->
    <rect x="-22" y="5" width="44" height="3" fill="#5a4a30" stroke="#3a2a10" stroke-width="0.5"/>
    <path d="M -15,5 Q -16,2 -15,0 Q -14,-1 -13,0 Q -12,2 -13,5" stroke="#5a4a30" stroke-width="1" fill="none"/>
  </g>
  <text x="320" y="345" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#a0e080" font-weight="bold">CABANA DE THESSARA</text>
  <text x="320" y="358" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#80b060" font-style="italic">Green Hag — CR 3 — AC 17 — HP 82</text>
  <text x="320" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#60a040" font-style="italic">Illusory Appearance: parece velha bondosa</text>

  <!-- Lavender plants around cabin -->
  <g opacity="0.4">
    <circle cx="270" cy="280" r="3" fill="#a060c0"/><circle cx="280" cy="275" r="2.5" fill="#a060c0"/><circle cx="360" cy="278" r="3" fill="#a060c0"/><circle cx="375" cy="285" r="2.5" fill="#a060c0"/>
    <text x="320" y="278" text-anchor="middle" font-family="Georgia, serif" font-size="6" fill="#a070c0" font-style="italic">lavanda</text>
  </g>

  <!-- Difficult terrain markers -->
  <g opacity="0.3">
    <text x="200" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#8a7a50" font-style="italic">terreno dificil</text>
    <text x="500" y="250" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#8a7a50" font-style="italic">terreno dificil</text>
    <text x="400" y="450" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#8a7a50" font-style="italic">agua rasa (terreno dificil)</text>
  </g>

  <!-- Legend -->
  <g transform="translate(20,430)">
    <rect x="0" y="0" width="170" height="90" rx="3" fill="#2a1a10" fill-opacity="0.92" stroke="#6a8a40" stroke-width="1"/>
    <text x="85" y="14" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#c0e0a0" font-weight="bold">NOTAS</text>
    <line x1="5" y1="18" x2="165" y2="18" stroke="#4a6a30" stroke-width="0.5"/>
    <text x="10" y="30" font-family="Georgia, serif" font-size="7" fill="#a0c080">Todo o pantano = terreno dificil</text>
    <text x="10" y="42" font-family="Georgia, serif" font-size="7" fill="#a0c080">Pocos de agua: nadar (Atletismo)</text>
    <text x="10" y="54" font-family="Georgia, serif" font-size="7" fill="#a0c080">Invisivel: Thessara pode sumir</text>
    <text x="10" y="66" font-family="Georgia, serif" font-size="7" fill="#c0a040">Cha da bruxa: 1d4 HP + vant. medo</text>
    <text x="10" y="78" font-family="Georgia, serif" font-size="7" fill="#aa6060">Se hostil: Invisible Passage + Claws</text>
  </g>

  <!-- Compass -->
  <g transform="translate(730,480)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="22" fill="#3a4a30" stroke="#6a8a40" stroke-width="1.2"/>
    <polygon points="0,-18 2,-5 -2,-5" fill="#8b0000"/><polygon points="0,18 2,5 -2,5" fill="#5a6a40"/>
    <polygon points="-18,0 -5,2 -5,-2" fill="#5a6a40"/><polygon points="18,0 5,2 5,-2" fill="#5a6a40"/>
    <text x="0" y="-24" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#8aaa60" font-weight="bold">N</text>
    <circle cx="0" cy="0" r="2" fill="#6a8a40"/>
  </g>

  <!-- Direction to ruins -->
  <g transform="translate(60,100)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="9" fill="#8a7a50" font-style="italic">↗ Ruinas de Aelindor</text>
    <text x="0" y="12" font-family="Georgia, serif" font-size="7" fill="#6a5a30" font-style="italic">(~meio dia de marcha)</text>
  </g>
  <g transform="translate(620,100)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="9" fill="#8a7a50" font-style="italic">Bosque Corrompido ↙</text>
  </g>
</svg>