<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <filter id="shadow"><feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#3a2a1a" flood-opacity="0.35"/></filter>
    <radialGradient id="bg" cx="50%" cy="50%" r="55%"><stop offset="0%" stop-color="#f0e6d0"/><stop offset="100%" stop-color="#c4a97a"/></radialGradient>
    <pattern id="grass" patternUnits="userSpaceOnUse" width="20" height="20">
      <rect width="20" height="20" fill="#c8b888"/>
      <circle cx="5" cy="8" r="0.5" fill="#a09868" opacity="0.4"/><circle cx="15" cy="4" r="0.5" fill="#a09868" opacity="0.4"/><circle cx="10" cy="16" r="0.5" fill="#a09868" opacity="0.4"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="#d8c8a8"/>
  <rect width="800" height="600" fill="url(#bg)" opacity="0.5"/>
  <rect width="800" height="600" fill="url(#grass)" opacity="0.15"/>
  <!-- Border -->
  <rect x="0" y="0" width="800" height="600" fill="none" stroke="#8a6a40" stroke-width="10"/>
  <rect x="5" y="5" width="790" height="590" fill="none" stroke="#a0845a" stroke-width="1.5"/>
  <!-- Title -->
  <rect x="200" y="12" width="400" height="42" rx="3" fill="#5a3520" opacity="0.85"/>
  <rect x="202" y="14" width="396" height="38" rx="2" fill="none" stroke="#c4a060" stroke-width="1"/>
  <text x="400" y="40" text-anchor="middle" font-family="Georgia, serif" font-size="20" fill="#e8d5b7" font-weight="bold" letter-spacing="2">VILA DE RAÍZES PROFUNDAS</text>
  <text x="400" y="49" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#c4a060" letter-spacing="1">ATO 1 — MAPA DA VILA</text>

  <!-- GIANT DEAD TREE (center of village) -->
  <g transform="translate(400,260)">
    <!-- Roots spreading out -->
    <path d="M 0,40 Q -80,50 -160,70 Q -200,80 -220,75" stroke="#6a5040" stroke-width="8" fill="none" opacity="0.5"/>
    <path d="M 0,40 Q 60,55 130,80 Q 180,95 200,90" stroke="#6a5040" stroke-width="7" fill="none" opacity="0.5"/>
    <path d="M 0,40 Q -40,60 -80,100 Q -120,130 -140,135" stroke="#6a5040" stroke-width="6" fill="none" opacity="0.4"/>
    <path d="M 0,40 Q 30,65 60,110 Q 90,140 110,145" stroke="#6a5040" stroke-width="6" fill="none" opacity="0.4"/>
    <path d="M 0,40 Q -100,30 -180,20" stroke="#6a5040" stroke-width="5" fill="none" opacity="0.35"/>
    <path d="M 0,40 Q 90,25 170,15" stroke="#6a5040" stroke-width="5" fill="none" opacity="0.35"/>
    <!-- Main trunk -->
    <rect x="-12" y="-60" width="24" height="100" rx="4" fill="#5a4030" stroke="#3a2a1a" stroke-width="1"/>
    <!-- Branches -->
    <line x1="0" y1="-40" x2="-45" y2="-90" stroke="#5a4030" stroke-width="5"/><line x1="-45" y1="-90" x2="-70" y2="-100" stroke="#5a4030" stroke-width="3"/>
    <line x1="0" y1="-45" x2="40" y2="-95" stroke="#5a4030" stroke-width="5"/><line x1="40" y1="-95" x2="65" y2="-105" stroke="#5a4030" stroke-width="3"/>
    <line x1="0" y1="-30" x2="-35" y2="-70" stroke="#5a4030" stroke-width="4"/><line x1="-35" y1="-70" x2="-55" y2="-80" stroke="#5a4030" stroke-width="2"/>
    <line x1="0" y1="-35" x2="30" y2="-75" stroke="#5a4030" stroke-width="4"/><line x1="30" y1="-75" x2="50" y2="-85" stroke="#5a4030" stroke-width="2"/>
    <line x1="0" y1="-50" x2="-20" y2="-100" stroke="#5a4030" stroke-width="4"/>
    <line x1="0" y1="-55" x2="15" y2="-105" stroke="#5a4030" stroke-width="4"/>
  </g>

  <!-- DIRT ROADS -->
  <!-- Main road E-W -->
  <path d="M 30,280 Q 100,275 200,270 Q 300,265 400,270 Q 500,275 600,268 Q 700,260 770,255" stroke="#a09070" stroke-width="12" fill="none" opacity="0.4" stroke-linecap="round"/>
  <!-- Road to cemetery (south) -->
  <path d="M 400,290 Q 410,340 420,400 Q 430,440 440,480" stroke="#a09070" stroke-width="8" fill="none" opacity="0.3" stroke-linecap="round"/>
  <!-- Road to Elarion (NE) -->
  <path d="M 450,260 Q 520,220 580,180 Q 620,160 660,145" stroke="#a09070" stroke-width="8" fill="none" opacity="0.3" stroke-linecap="round"/>
  <!-- Road north -->
  <path d="M 380,260 Q 370,200 360,140 Q 355,100 350,70" stroke="#a09070" stroke-width="8" fill="none" opacity="0.3" stroke-linecap="round"/>

  <!-- WELL (central plaza) -->
  <g transform="translate(370,310)" filter="url(#shadow)">
    <circle cx="0" cy="0" r="14" fill="#7a7a7a" stroke="#4a4a4a" stroke-width="2"/>
    <circle cx="0" cy="0" r="10" fill="#2a3a4a" stroke="#3a4a5a" stroke-width="1"/>
    <line x1="-8" y1="-12" x2="-8" y2="-22" stroke="#6a5a40" stroke-width="2"/>
    <line x1="8" y1="-12" x2="8" y2="-22" stroke="#6a5a40" stroke-width="2"/>
    <line x1="-10" y1="-22" x2="10" y2="-22" stroke="#6a5a40" stroke-width="2"/>
    <rect x="-3" y="-25" width="6" height="4" rx="1" fill="#6a5a40"/>
  </g>
  <text x="370" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#3a2010" font-weight="bold">Poco Central</text>
  <text x="370" y="350" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#6a4a20" font-style="italic">(Necromancia fraca)</text>

  <!-- HOUSES (generic village buildings) -->
  <g opacity="0.7">
    <!-- Row north of road -->
    <g transform="translate(200,230)"><rect x="-8" y="-6" width="16" height="12" fill="#b89a70" stroke="#5a4030" stroke-width="1" rx="1"/><polygon points="-10,-6 0,-14 10,-6" fill="#8b4513" stroke="#5a3010" stroke-width="0.8"/></g>
    <g transform="translate(240,220)"><rect x="-10" y="-6" width="20" height="12" fill="#b89a70" stroke="#5a4030" stroke-width="1" rx="1"/><polygon points="-12,-6 0,-16 12,-6" fill="#8b4513" stroke="#5a3010" stroke-width="0.8"/></g>
    <g transform="translate(280,235)"><rect x="-7" y="-5" width="14" height="10" fill="#b89a70" stroke="#5a4030" stroke-width="1" rx="1"/><polygon points="-9,-5 0,-12 9,-5" fill="#8b4513" stroke="#5a3010" stroke-width="0.8"/></g>
    <g transform="translate(470,230)"><rect x="-8" y="-6" width="16" height="12" fill="#b89a70" stroke="#5a4030" stroke-width="1" rx="1"/><polygon points="-10,-6 0,-14 10,-6" fill="#8b4513" stroke="#5a3010" stroke-width="0.8"/></g>
    <g transform="translate(510,225)"><rect x="-9" y="-5" width="18" height="10" fill="#b89a70" stroke="#5a4030" stroke-width="1" rx="1"/><polygon points="-11,-5 0,-14 11,-5" fill="#8b4513" stroke="#5a3010" stroke-width="0.8"/></g>
    <g transform="translate(550,240)"><rect x="-7" y="-5" width="14" height="10" fill="#b89a70" stroke="#5a4030" stroke-width="1" rx="1"/><polygon points="-9,-5 0,-12 9,-5" fill="#8b4513" stroke="#5a3010" stroke-width="0.8"/></g>
    <!-- Row south of road -->
    <g transform="translate(220,320)"><rect x="-8" y="-6" width="16" height="12" fill="#b89a70" stroke="#5a4030" stroke-width="1" rx="1"/><polygon points="-10,-6 0,-14 10,-6" fill="#8b4513" stroke="#5a3010" stroke-width="0.8"/></g>
    <g transform="translate(260,330)"><rect x="-7" y="-5" width="14" height="10" fill="#b89a70" stroke="#5a4030" stroke-width="1" rx="1"/><polygon points="-9,-5 0,-12 9,-5" fill="#8b4513" stroke="#5a3010" stroke-width="0.8"/></g>
    <g transform="translate(480,320)"><rect x="-8" y="-6" width="16" height="12" fill="#b89a70" stroke="#5a4030" stroke-width="1" rx="1"/><polygon points="-10,-6 0,-14 10,-6" fill="#8b4513" stroke="#5a3010" stroke-width="0.8"/></g>
    <g transform="translate(520,335)"><rect x="-7" y="-5" width="14" height="10" fill="#b89a70" stroke="#5a4030" stroke-width="1" rx="1"/><polygon points="-9,-5 0,-12 9,-5" fill="#8b4513" stroke="#5a3010" stroke-width="0.8"/></g>
    <g transform="translate(310,340)"><rect x="-6" y="-5" width="12" height="10" fill="#b89a70" stroke="#5a4030" stroke-width="1" rx="1"/><polygon points="-8,-5 0,-12 8,-5" fill="#8b4513" stroke="#5a3010" stroke-width="0.8"/></g>
    <g transform="translate(440,340)"><rect x="-6" y="-5" width="12" height="10" fill="#b89a70" stroke="#5a4030" stroke-width="1" rx="1"/><polygon points="-8,-5 0,-12 8,-5" fill="#8b4513" stroke="#5a3010" stroke-width="0.8"/></g>
  </g>

  <!-- A RAIZ TORTA (Tavern) - larger, with sign -->
  <g transform="translate(160,290)" filter="url(#shadow)">
    <rect x="-20" y="-15" width="40" height="30" rx="2" fill="#a07848" stroke="#5a3520" stroke-width="1.5"/>
    <polygon points="-24,-15 0,-30 24,-15" fill="#7a3010" stroke="#5a2010" stroke-width="1"/>
    <!-- Chimney -->
    <rect x="10" y="-32" width="6" height="10" fill="#6a5a4a" stroke="#4a3a2a" stroke-width="0.5"/>
    <!-- Door -->
    <rect x="-4" y="0" width="8" height="15" rx="1" fill="#5a3520" stroke="#3a2010" stroke-width="0.5"/>
    <!-- Light from windows -->
    <rect x="-16" y="-8" width="8" height="6" rx="1" fill="#e8c860" opacity="0.6" stroke="#8a6a20" stroke-width="0.5"/>
    <rect x="8" y="-8" width="8" height="6" rx="1" fill="#e8c860" opacity="0.6" stroke="#8a6a20" stroke-width="0.5"/>
    <!-- Sign -->
    <line x1="-24" y1="-10" x2="-30" y2="-10" stroke="#5a4030" stroke-width="1.5"/>
    <rect x="-50" y="-18" width="22" height="16" rx="1" fill="#5a3520" stroke="#8a6a40" stroke-width="0.5"/>
    <text x="-39" y="-8" text-anchor="middle" font-family="Georgia, serif" font-size="5" fill="#e8d5b7">Raiz</text>
    <text x="-39" y="-3" text-anchor="middle" font-family="Georgia, serif" font-size="5" fill="#e8d5b7">Torta</text>
  </g>
  <g transform="translate(160,325)">
    <rect x="-35" y="0" width="70" height="14" rx="2" fill="#8b4513" fill-opacity="0.8"/>
    <text x="0" y="10" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#e8d5b7" font-weight="bold">A Raiz Torta</text>
  </g>
  <text x="160" y="348" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#5a3520" font-style="italic">Taverna de Lyra</text>

  <!-- QUARTEL DA MILÍCIA -->
  <g transform="translate(320,180)" filter="url(#shadow)">
    <rect x="-22" y="-15" width="44" height="30" rx="1" fill="#8a7a6a" stroke="#4a3a2a" stroke-width="1.5"/>
    <polygon points="-26,-15 0,-28 26,-15" fill="#6a5a4a" stroke="#4a3a2a" stroke-width="1"/>
    <!-- Watchtower -->
    <rect x="14" y="-35" width="10" height="20" fill="#7a6a5a" stroke="#4a3a2a" stroke-width="1"/>
    <polygon points="12,-35 19,-42 26,-35" fill="#5a4a3a" stroke="#4a3a2a" stroke-width="0.5"/>
    <!-- Flag -->
    <line x1="19" y1="-42" x2="19" y2="-52" stroke="#4a3a2a" stroke-width="1"/>
    <polygon points="19,-52 32,-48 19,-44" fill="#8b0000" opacity="0.7"/>
    <!-- Palisade -->
    <line x1="-28" y1="15" x2="-28" y2="-5" stroke="#6a5a40" stroke-width="2"/><line x1="-24" y1="15" x2="-24" y2="-3" stroke="#6a5a40" stroke-width="2"/>
    <line x1="28" y1="15" x2="28" y2="-5" stroke="#6a5a40" stroke-width="2"/><line x1="24" y1="15" x2="24" y2="-3" stroke="#6a5a40" stroke-width="2"/>
  </g>
  <g transform="translate(320,205)">
    <rect x="-40" y="0" width="80" height="14" rx="2" fill="#4a3a2a" fill-opacity="0.8"/>
    <text x="0" y="10" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#d4c8a8" font-weight="bold">Quartel da Milicia</text>
  </g>
  <text x="320" y="228" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#5a3520" font-style="italic">Capitao Brenn</text>

  <!-- CASA DE ELARION (stone tower) -->
  <g transform="translate(670,130)" filter="url(#shadow)">
    <!-- Tower base -->
    <rect x="-12" y="-20" width="24" height="40" rx="2" fill="#8a8a7a" stroke="#5a5a4a" stroke-width="1.5"/>
    <!-- Crenellations -->
    <rect x="-14" y="-24" width="6" height="6" fill="#8a8a7a" stroke="#5a5a4a" stroke-width="0.5"/>
    <rect x="-4" y="-24" width="6" height="6" fill="#8a8a7a" stroke="#5a5a4a" stroke-width="0.5"/>
    <rect x="8" y="-24" width="6" height="6" fill="#8a8a7a" stroke="#5a5a4a" stroke-width="0.5"/>
    <!-- Window with light -->
    <rect x="-3" y="-14" width="6" height="8" rx="1" fill="#4060a0" opacity="0.5" stroke="#5a5a4a" stroke-width="0.5"/>
    <!-- Ivy -->
    <path d="M -12,-10 Q -16,-5 -14,0 Q -18,5 -15,10" stroke="#3a6a30" stroke-width="1.5" fill="none" opacity="0.6"/>
    <path d="M 12,-15 Q 16,-10 14,-5 Q 18,0 15,5" stroke="#3a6a30" stroke-width="1.5" fill="none" opacity="0.6"/>
    <circle cx="-14" cy="-5" r="2" fill="#3a6a30" opacity="0.4"/><circle cx="-16" cy="3" r="2" fill="#3a6a30" opacity="0.4"/>
    <circle cx="16" cy="-8" r="2" fill="#3a6a30" opacity="0.4"/><circle cx="14" cy="0" r="2" fill="#3a6a30" opacity="0.4"/>
    <!-- Door -->
    <rect x="-4" y="8" width="8" height="12" rx="3" fill="#5a4030" stroke="#3a2a1a" stroke-width="0.5"/>
  </g>
  <g transform="translate(670,175)">
    <rect x="-42" y="0" width="84" height="14" rx="2" fill="#3a5a3a" fill-opacity="0.8"/>
    <text x="0" y="10" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#c4e8c4" font-weight="bold">Casa de Elarion</text>
  </g>
  <text x="670" y="198" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#2a4a2a" font-style="italic">Sabio Elfico - Torre de Pedra</text>

  <!-- CEMITÉRIO -->
  <g transform="translate(450,490)" filter="url(#shadow)">
    <!-- Fence -->
    <rect x="-45" y="-30" width="90" height="55" rx="2" fill="none" stroke="#5a4a3a" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- Gravestones -->
    <rect x="-30" y="-15" width="8" height="12" rx="2" fill="#7a7a6a" stroke="#5a5a4a" stroke-width="0.5"/>
    <rect x="-15" y="-18" width="8" height="14" rx="2" fill="#7a7a6a" stroke="#5a5a4a" stroke-width="0.5"/>
    <rect x="0" y="-13" width="8" height="10" rx="2" fill="#7a7a6a" stroke="#5a5a4a" stroke-width="0.5"/>
    <rect x="15" y="-16" width="8" height="12" rx="2" fill="#7a7a6a" stroke="#5a5a4a" stroke-width="0.5"/>
    <rect x="30" y="-14" width="6" height="10" rx="2" fill="#7a7a6a" stroke="#5a5a4a" stroke-width="0.5"/>
    <!-- Disturbed graves (red X) -->
    <g stroke="#8b0000" stroke-width="1.5" opacity="0.6">
      <line x1="-30" y1="-5" x2="-22" y2="8"/><line x1="-22" y1="-5" x2="-30" y2="8"/>
      <line x1="-15" y1="-5" x2="-7" y2="8"/><line x1="-7" y1="-5" x2="-15" y2="8"/>
      <line x1="15" y1="-5" x2="23" y2="8"/><line x1="23" y1="-5" x2="15" y2="8"/>
    </g>
    <!-- Root intrusion -->
    <path d="M -45,-20 Q -55,-15 -60,-5 Q -65,5 -55,10" stroke="#6a5040" stroke-width="4" fill="none" opacity="0.5"/>
    <path d="M 45,-10 Q 55,-5 58,5" stroke="#6a5040" stroke-width="3" fill="none" opacity="0.5"/>
  </g>
  <g transform="translate(450,530)">
    <rect x="-35" y="0" width="70" height="14" rx="2" fill="#3a2a2a" fill-opacity="0.8"/>
    <text x="0" y="10" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#c8b8a8" font-weight="bold">Cemiterio</text>
  </g>
  <text x="450" y="555" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#6a3a3a" font-style="italic">3 tumulos violados - Simbolo de Lolth</text>

  <!-- WHEAT FIELDS -->
  <g opacity="0.3">
    <rect x="30" y="160" width="80" height="60" rx="3" fill="#c8a040" stroke="#a08030" stroke-width="0.5" stroke-dasharray="2,2"/>
    <rect x="30" y="340" width="70" height="50" rx="3" fill="#c8a040" stroke="#a08030" stroke-width="0.5" stroke-dasharray="2,2"/>
    <rect x="620" y="280" width="60" height="50" rx="3" fill="#c8a040" stroke="#a08030" stroke-width="0.5" stroke-dasharray="2,2"/>
    <text x="70" y="195" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#8a6a20" font-style="italic">trigo</text>
    <text x="65" y="370" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#8a6a20" font-style="italic">trigo</text>
    <text x="650" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#8a6a20" font-style="italic">trigo</text>
  </g>

  <!-- Direction indicators -->
  <g transform="translate(60,260)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="9" fill="#7a5a30" font-style="italic">← Estrada para</text>
    <text x="0" y="10" font-family="Georgia, serif" font-size="9" fill="#7a5a30" font-style="italic">   fora da vila</text>
  </g>
  <g transform="translate(680,245)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="9" fill="#7a5a30" font-style="italic">Floresta →</text>
  </g>
  <g transform="translate(330,75)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="9" fill="#7a5a30" font-style="italic">↑ Campos ao norte</text>
  </g>

  <!-- Numbered location markers -->
  <g filter="url(#shadow)">
    <circle cx="130" cy="290" r="9" fill="#8b4513" opacity="0.9"/><text x="130" y="293" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#e8d5b7" font-weight="bold">1</text>
    <circle cx="290" cy="170" r="9" fill="#4a3a2a" opacity="0.9"/><text x="290" y="173" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#d4c8a8" font-weight="bold">2</text>
    <circle cx="640" cy="125" r="9" fill="#3a5a3a" opacity="0.9"/><text x="640" y="128" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#c4e8c4" font-weight="bold">3</text>
    <circle cx="345" cy="310" r="9" fill="#5a5a7a" opacity="0.9"/><text x="345" y="313" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#d4d4e8" font-weight="bold">4</text>
    <circle cx="415" cy="470" r="9" fill="#3a2a2a" opacity="0.9"/><text x="415" y="473" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#c8b8a8" font-weight="bold">5</text>
  </g>

  <!-- Legend -->
  <g transform="translate(30,430)">
    <rect x="0" y="0" width="155" height="120" rx="3" fill="#e8d5b7" fill-opacity="0.92" stroke="#8a6a40" stroke-width="1"/>
    <text x="78" y="16" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#3a2010" font-weight="bold" letter-spacing="1">LOCAIS</text>
    <line x1="5" y1="21" x2="150" y2="21" stroke="#8a6a40" stroke-width="0.5"/>
    <circle cx="18" cy="35" r="6" fill="#8b4513" opacity="0.9"/><text x="18" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#e8d5b7" font-weight="bold">1</text>
    <text x="30" y="38" font-family="Georgia, serif" font-size="8" fill="#3a2010">A Raiz Torta (Taverna)</text>
    <circle cx="18" cy="53" r="6" fill="#4a3a2a" opacity="0.9"/><text x="18" y="56" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#d4c8a8" font-weight="bold">2</text>
    <text x="30" y="56" font-family="Georgia, serif" font-size="8" fill="#3a2010">Quartel da Milicia</text>
    <circle cx="18" cy="71" r="6" fill="#3a5a3a" opacity="0.9"/><text x="18" y="74" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#c4e8c4" font-weight="bold">3</text>
    <text x="30" y="74" font-family="Georgia, serif" font-size="8" fill="#3a2010">Casa de Elarion</text>
    <circle cx="18" cy="89" r="6" fill="#5a5a7a" opacity="0.9"/><text x="18" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#d4d4e8" font-weight="bold">4</text>
    <text x="30" y="92" font-family="Georgia, serif" font-size="8" fill="#3a2010">Poco Central</text>
    <circle cx="18" cy="107" r="6" fill="#3a2a2a" opacity="0.9"/><text x="18" y="110" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#c8b8a8" font-weight="bold">5</text>
    <text x="30" y="110" font-family="Georgia, serif" font-size="8" fill="#3a2010">Cemiterio</text>
  </g>

