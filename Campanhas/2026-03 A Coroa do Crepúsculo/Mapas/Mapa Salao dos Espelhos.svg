<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <filter id="shadow"><feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#1a1a2a" flood-opacity="0.5"/></filter>
    <linearGradient id="mirror" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a0b0c0" stop-opacity="0.5"/><stop offset="50%" stop-color="#d0d8e0" stop-opacity="0.6"/><stop offset="100%" stop-color="#8090a0" stop-opacity="0.5"/>
    </linearGradient>
    <radialGradient id="mirrorGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c0d0e0" stop-opacity="0.2"/><stop offset="100%" stop-color="#c0d0e0" stop-opacity="0"/>
    </radialGradient>
    <pattern id="stoneFloor" patternUnits="userSpaceOnUse" width="16" height="16">
      <rect width="16" height="16" fill="#3a3838"/><rect x="0" y="0" width="8" height="8" fill="#383636" stroke="#302e2e" stroke-width="0.2"/><rect x="8" y="8" width="8" height="8" fill="#383636" stroke="#302e2e" stroke-width="0.2"/>
    </pattern>
    <pattern id="wallStone" patternUnits="userSpaceOnUse" width="12" height="12">
      <rect width="12" height="12" fill="#2a2a2a"/><rect x="0" y="0" width="6" height="6" fill="#282828" stroke="#222" stroke-width="0.2"/><rect x="6" y="6" width="6" height="6" fill="#282828" stroke="#222" stroke-width="0.2"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#wallStone)"/>
  <!-- Border -->
  <rect x="0" y="0" width="800" height="600" fill="none" stroke="#5a5a6a" stroke-width="8"/>
  <rect x="4" y="4" width="792" height="592" fill="none" stroke="#7a7a8a" stroke-width="1"/>
  <!-- Title -->
  <rect x="210" y="10" width="380" height="38" rx="3" fill="#1a1a2a" opacity="0.95"/>
  <rect x="212" y="12" width="376" height="34" rx="2" fill="none" stroke="#a0b0c0" stroke-width="0.8"/>
  <text x="400" y="33" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#c0d0e0" font-weight="bold" letter-spacing="2">SALAO DOS ESPELHOS</text>
  <text x="400" y="42" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#8090a0" letter-spacing="1">ATO 3 — CENA 3.2 — RUINAS NIVEL 2</text>

  <!-- STAIRCASE FROM LEVEL 1 (top) -->
  <g transform="translate(400,80)">
    <rect x="-20" y="-15" width="40" height="25" fill="url(#stoneFloor)" stroke="#4a4a4a" stroke-width="1.5"/>
    <line x1="-15" y1="-10" x2="15" y2="-10" stroke="#5a5a5a" stroke-width="0.8"/>
    <line x1="-13" y1="-5" x2="13" y2="-5" stroke="#5a5a5a" stroke-width="0.8"/>
    <line x1="-11" y1="0" x2="11" y2="0" stroke="#5a5a5a" stroke-width="0.8"/>
    <polygon points="0,-22 5,-16 -5,-16" fill="#7a7a6a" opacity="0.6"/>
    <text x="0" y="-26" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#8a8a7a">← Nivel 1</text>
  </g>

  <!-- Corridor to main hall -->
  <rect x="385" y="90" width="30" height="40" fill="url(#stoneFloor)" stroke="#4a4a4a" stroke-width="0.8"/>

  <!-- MAIN HALL (square, 10m x 10m) -->
  <g transform="translate(400,260)">
    <rect x="-110" y="-110" width="220" height="220" rx="3" fill="url(#stoneFloor)" stroke="#5a5a5a" stroke-width="2"/>
    
    <!-- Mirror walls - all four sides -->
    <!-- Top wall mirrors -->
    <g opacity="0.7">
      <rect x="-100" y="-108" width="25" height="5" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
      <rect x="-70" y="-108" width="25" height="5" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
      <rect x="-40" y="-108" width="25" height="5" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
      <rect x="-10" y="-108" width="25" height="5" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
      <rect x="20" y="-108" width="25" height="5" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
      <rect x="50" y="-108" width="25" height="5" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
      <rect x="80" y="-108" width="20" height="5" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
    </g>
    <!-- Bottom wall mirrors -->
    <g opacity="0.7">
      <rect x="-100" y="103" width="25" height="5" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
      <rect x="-70" y="103" width="25" height="5" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
      <rect x="-40" y="103" width="25" height="5" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
      <rect x="-10" y="103" width="25" height="5" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
      <rect x="20" y="103" width="25" height="5" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
      <rect x="50" y="103" width="25" height="5" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
      <rect x="80" y="103" width="20" height="5" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
    </g>
    <!-- Left wall mirrors -->
    <g opacity="0.7">
      <rect x="-108" y="-95" width="5" height="25" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
      <rect x="-108" y="-65" width="5" height="25" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
      <rect x="-108" y="-35" width="5" height="25" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
      <rect x="-108" y="-5" width="5" height="25" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
      <rect x="-108" y="25" width="5" height="25" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
      <rect x="-108" y="55" width="5" height="25" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
      <rect x="-108" y="85" width="5" height="18" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
    </g>
    <!-- Right wall mirrors -->
    <g opacity="0.7">
      <rect x="103" y="-95" width="5" height="25" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
      <rect x="103" y="-65" width="5" height="25" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
      <rect x="103" y="-35" width="5" height="25" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
      <rect x="103" y="-5" width="5" height="25" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
      <rect x="103" y="25" width="5" height="25" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
      <rect x="103" y="55" width="5" height="25" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
      <rect x="103" y="85" width="5" height="18" fill="url(#mirror)" stroke="#b0c0d0" stroke-width="0.5"/>
    </g>

    <!-- Mirror glow effect -->
    <circle cx="0" cy="0" r="100" fill="url(#mirrorGlow)" opacity="0.3"/>

    <!-- Doppelganger spawn point -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="#c0d0e0" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>
    <text x="0" y="3" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#c0d0e0" opacity="0.6">?</text>
  </g>
  <text x="400" y="185" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#c0d0e0" font-weight="bold">SALAO PRINCIPAL</text>
  <text x="400" y="197" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#8090a0" font-style="italic">Espelhos em todas as paredes — 10m x 10m</text>
  <text x="400" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#a0b0c0" font-style="italic">Doppelganger Espelhado (CR 3)</text>
  <text x="400" y="350" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#8090a0" font-style="italic">Emerge de um espelho apos reflexos falarem</text>

  <!-- THREE DOORS (after mirrors shatter) -->
  <!-- LEFT DOOR (Iron - Prison Cell with Ghost) -->
  <g transform="translate(200,430)" filter="url(#shadow)">
    <rect x="-40" y="-25" width="80" height="50" rx="3" fill="url(#stoneFloor)" stroke="#6a5a4a" stroke-width="1.5"/>
    <!-- Iron door -->
    <rect x="-8" y="-25" width="16" height="6" rx="1" fill="#5a5a5a" stroke="#7a7a7a" stroke-width="1"/>
    <!-- Claw marks -->
    <line x1="-4" y1="-24" x2="-6" y2="-20" stroke="#8a3030" stroke-width="0.8"/>
    <line x1="0" y1="-24" x2="-2" y2="-20" stroke="#8a3030" stroke-width="0.8"/>
    <line x1="4" y1="-24" x2="2" y2="-20" stroke="#8a3030" stroke-width="0.8"/>
    <!-- Ghost -->
    <ellipse cx="0" cy="5" rx="10" ry="12" fill="#8090a0" opacity="0.2" stroke="#a0b0c0" stroke-width="0.8" stroke-dasharray="2,1"/>
    <text x="0" y="10" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#c0d0e0" opacity="0.5">Ghost</text>
  </g>
  <text x="200" y="470" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#8a8a8a" font-weight="bold">PORTA ESQUERDA</text>
  <text x="200" y="481" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#6a6a6a" font-style="italic">Ferro — Cela do Prisioneiro</text>
  <text x="200" y="492" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#6a8a6a">Loot: Chain Shirt +1</text>
  <text x="200" y="502" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#aa6060">Ghost CR 4 (pode ser apaziguado)</text>

  <!-- CENTER DOOR (Wood - Path to Drider) -->
  <g transform="translate(400,440)" filter="url(#shadow)">
    <rect x="-35" y="-25" width="70" height="50" rx="3" fill="url(#stoneFloor)" stroke="#6a5a3a" stroke-width="1.5"/>
    <!-- Wooden door (elven) -->
    <rect x="-10" y="-25" width="20" height="6" rx="1" fill="#6a5030" stroke="#8a7050" stroke-width="1"/>
    <!-- Leaf motif -->
    <path d="M -3,-24 Q 0,-28 3,-24" stroke="#4a6a30" stroke-width="0.8" fill="none"/>
    <!-- Arrow forward -->
    <polygon points="0,15 8,8 -8,8" fill="#8a7a6a" opacity="0.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#a09070" font-style="italic">"O Guardiao Dorme"</text>
  </g>
  <text x="400" y="480" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#a09070" font-weight="bold">PORTA CENTRAL</text>
  <text x="400" y="491" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#8a7a5a" font-style="italic">Madeira elfica — Chave de obsidiana</text>
  <text x="400" y="502" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#8080a0">→ Cena 3.3 (Ponte do Guardiao)</text>

  <!-- RIGHT DOOR (Stone - Arcane Storage) -->
  <g transform="translate(600,430)" filter="url(#shadow)">
    <rect x="-40" y="-25" width="80" height="50" rx="3" fill="url(#stoneFloor)" stroke="#5a5a5a" stroke-width="1.5"/>
    <!-- Stone door (smooth) -->
    <rect x="-8" y="-25" width="16" height="6" rx="1" fill="#6a6a6a" stroke="#8a8a8a" stroke-width="1"/>
    <!-- Glyph trap indicator -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="#aa3030" stroke-width="0.8" stroke-dasharray="2,2"/>
    <text x="0" y="4" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#aa3030" font-weight="bold">!</text>
    <text x="0" y="20" text-anchor="middle" font-family="Georgia, serif" font-size="6" fill="#aa3030" font-style="italic">Glyph of Warding</text>
  </g>
  <text x="600" y="470" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#8a8a8a" font-weight="bold">PORTA DIREITA</text>
  <text x="600" y="481" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#6a6a6a" font-style="italic">Pedra lisa — Deposito Arcano</text>
  <text x="600" y="492" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#aa5050">Armadilha: 5d8 trovejante (Dex DC 15)</text>
  <text x="600" y="502" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#6a8a6a">Loot: 2x Pocao Cura Maior + 80po</text>

  <!-- Connection lines from hall to doors -->
  <line x1="310" y1="370" x2="220" y2="405" stroke="#5a5a5a" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="400" y1="370" x2="400" y2="415" stroke="#5a5a5a" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="490" y1="370" x2="580" y2="405" stroke="#5a5a5a" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Phase labels -->
  <g transform="translate(100,140)">
    <rect x="0" y="0" width="140" height="75" rx="3" fill="#1a1a2a" fill-opacity="0.95" stroke="#a0b0c0" stroke-width="0.8"/>
    <text x="70" y="15" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#c0d0e0" font-weight="bold">FASES DO ENCONTRO</text>
    <line x1="5" y1="19" x2="135" y2="19" stroke="#5a5a6a" stroke-width="0.5"/>
    <text x="10" y="32" font-family="Georgia, serif" font-size="7" fill="#a0b0c0">1. Reflexos falam (Sab DC 14)</text>
    <text x="10" y="44" font-family="Georgia, serif" font-size="7" fill="#a0b0c0">2. Doppelganger emerge</text>
    <text x="10" y="56" font-family="Georgia, serif" font-size="7" fill="#a0b0c0">3. Espelhos estilhacam</text>
    <text x="10" y="68" font-family="Georgia, serif" font-size="7" fill="#a0b0c0">4. Tres portas reveladas</text>
  </g>

  <!-- Scale -->
  <g transform="translate(630,560)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="7" fill="#6a6a6a" font-style="italic">Salao real: 10m x 10m</text>
    <text x="0" y="10" font-family="Georgia, serif" font-size="7" fill="#6a6a6a" font-style="italic">(parece infinito nos espelhos)</text>
  </g>
</svg>