<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <filter id="shadow"><feDropShadow dx="1" dy="1" stdDeviation="1.5" flood-color="#0a0a1a" flood-opacity="0.6"/></filter>
    <linearGradient id="abyss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1020"/><stop offset="50%" stop-color="#0a0510"/><stop offset="100%" stop-color="#000005"/>
    </linearGradient>
    <radialGradient id="purpleGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7040a0" stop-opacity="0.4"/><stop offset="100%" stop-color="#7040a0" stop-opacity="0"/>
    </radialGradient>
    <pattern id="stoneWall" patternUnits="userSpaceOnUse" width="12" height="12">
      <rect width="12" height="12" fill="#4a4540"/><rect x="0" y="0" width="6" height="6" fill="#464240" stroke="#3a3835" stroke-width="0.2"/><rect x="6" y="6" width="6" height="6" fill="#464240" stroke="#3a3835" stroke-width="0.2"/>
    </pattern>
    <pattern id="web" patternUnits="userSpaceOnUse" width="30" height="30">
      <line x1="0" y1="0" x2="30" y2="30" stroke="#a0a0a0" stroke-width="0.3" opacity="0.3"/>
      <line x1="30" y1="0" x2="0" y2="30" stroke="#a0a0a0" stroke-width="0.3" opacity="0.3"/>
      <line x1="15" y1="0" x2="15" y2="30" stroke="#a0a0a0" stroke-width="0.2" opacity="0.2"/>
    </pattern>
  </defs>
  <!-- Background - cavern -->
  <rect width="800" height="500" fill="#1a1520"/>
  <!-- Border -->
  <rect x="0" y="0" width="800" height="500" fill="none" stroke="#5a4a5a" stroke-width="8"/>
  <!-- Title -->
  <rect x="200" y="8" width="400" height="36" rx="3" fill="#1a1020" opacity="0.95"/>
  <rect x="202" y="10" width="396" height="32" rx="2" fill="none" stroke="#8060a0" stroke-width="0.8"/>
  <text x="400" y="31" text-anchor="middle" font-family="Georgia, serif" font-size="17" fill="#c0a0e0" font-weight="bold" letter-spacing="2">A PONTE DO GUARDIAO</text>
  <text x="400" y="39" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#8060a0" letter-spacing="1">ATO 3 — CENA 3.3 — COMBATE COM XARITHEL</text>

  <!-- Cavern walls (irregular edges) -->
  <g fill="#2a2530" stroke="#3a3540" stroke-width="1">
    <!-- Top wall -->
    <path d="M 0,70 Q 100,80 200,65 Q 300,55 400,75 Q 500,60 600,70 Q 700,55 800,65 L 800,0 L 0,0 Z"/>
    <!-- Bottom wall -->
    <path d="M 0,430 Q 100,420 200,440 Q 300,445 400,425 Q 500,440 600,430 Q 700,445 800,435 L 800,500 L 0,500 Z"/>
  </g>

  <!-- ABYSS -->
  <rect x="50" y="80" width="700" height="340" rx="5" fill="url(#abyss)"/>
  <!-- Purple glow from below -->
  <ellipse cx="400" cy="400" rx="200" ry="40" fill="url(#purpleGlow)" opacity="0.3"/>
  <ellipse cx="400" cy="380" rx="100" ry="20" fill="url(#purpleGlow)" opacity="0.2"/>

  <!-- Depth markers -->
  <text x="680" y="160" font-family="Georgia, serif" font-size="8" fill="#4a3a5a" font-style="italic" opacity="0.5">10m</text>
  <text x="680" y="240" font-family="Georgia, serif" font-size="8" fill="#4a3a5a" font-style="italic" opacity="0.5">20m</text>
  <text x="680" y="320" font-family="Georgia, serif" font-size="8" fill="#4a3a5a" font-style="italic" opacity="0.5">30m</text>
  <line x1="670" y1="90" x2="670" y2="380" stroke="#4a3a5a" stroke-width="0.5" stroke-dasharray="3,3" opacity="0.3"/>

  <!-- LEFT PLATFORM (Entrada) -->
  <g transform="translate(100,250)" filter="url(#shadow)">
    <rect x="-45" y="-80" width="90" height="160" rx="5" fill="url(#stoneWall)" stroke="#5a5550" stroke-width="2"/>
    <!-- Web on platform edge -->
    <rect x="-45" y="-80" width="90" height="30" fill="url(#web)" opacity="0.3" rx="5"/>
    <text x="0" y="-55" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#8a8a8a" font-style="italic">Terreno dificil (teias)</text>
  </g>
  <text x="100" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#c0b0a0" font-weight="bold">ENTRADA</text>
  <text x="100" y="212" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#8a7a6a" font-style="italic">← do Salao dos Espelhos</text>

  <!-- RIGHT PLATFORM (Portal do Santuário) -->
  <g transform="translate(700,250)" filter="url(#shadow)">
    <rect x="-45" y="-80" width="90" height="160" rx="5" fill="url(#stoneWall)" stroke="#5a5550" stroke-width="2"/>
    <!-- Web on platform edge -->
    <rect x="-45" y="50" width="90" height="30" fill="url(#web)" opacity="0.3" rx="5"/>
    <text x="0" y="65" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#8a8a8a" font-style="italic">Terreno dificil (teias)</text>
    <!-- Portal glow -->
    <rect x="-20" y="-50" width="40" height="55" rx="15" fill="none" stroke="#9060c0" stroke-width="2" opacity="0.6"/>
    <rect x="-20" y="-50" width="40" height="55" rx="15" fill="#7040a0" opacity="0.1"/>
    <text x="0" y="-22" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#c0a0e0" font-weight="bold">PORTAL</text>
  </g>
  <text x="700" y="200" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#c0a0e0" font-weight="bold">SANTUARIO</text>
  <text x="700" y="212" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#9070b0" font-style="italic">Portal do Crepusculo →</text>

  <!-- THE BRIDGE -->
  <g filter="url(#shadow)">
    <rect x="145" y="230" width="510" height="40" rx="2" fill="url(#stoneWall)" stroke="#6a6560" stroke-width="2"/>
    <!-- Bridge surface details -->
    <line x1="200" y1="232" x2="200" y2="268" stroke="#5a5550" stroke-width="0.5" opacity="0.4"/>
    <line x1="260" y1="232" x2="260" y2="268" stroke="#5a5550" stroke-width="0.5" opacity="0.4"/>
    <line x1="320" y1="232" x2="320" y2="268" stroke="#5a5550" stroke-width="0.5" opacity="0.4"/>
    <line x1="380" y1="232" x2="380" y2="268" stroke="#5a5550" stroke-width="0.5" opacity="0.4"/>
    <line x1="440" y1="232" x2="440" y2="268" stroke="#5a5550" stroke-width="0.5" opacity="0.4"/>
    <line x1="500" y1="232" x2="500" y2="268" stroke="#5a5550" stroke-width="0.5" opacity="0.4"/>
    <line x1="560" y1="232" x2="560" y2="268" stroke="#5a5550" stroke-width="0.5" opacity="0.4"/>
    <line x1="620" y1="232" x2="620" y2="268" stroke="#5a5550" stroke-width="0.5" opacity="0.4"/>
  </g>

  <!-- Bridge dimensions -->
  <line x1="150" y1="280" x2="650" y2="280" stroke="#8a7a6a" stroke-width="0.8" opacity="0.5"/>
  <line x1="150" y1="276" x2="150" y2="284" stroke="#8a7a6a" stroke-width="0.8" opacity="0.5"/>
  <line x1="650" y1="276" x2="650" y2="284" stroke="#8a7a6a" stroke-width="0.8" opacity="0.5"/>
  <text x="400" y="292" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#8a7a6a" font-style="italic">~9m (30ft)</text>
  <line x1="140" y1="232" x2="140" y2="268" stroke="#8a7a6a" stroke-width="0.8" opacity="0.5"/>
  <text x="132" y="255" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#8a7a6a" transform="rotate(-90,132,255)">~3m</text>

  <!-- WEBS on ceiling -->
  <g opacity="0.25" stroke="#c0c0c0" stroke-width="0.5" fill="none">
    <path d="M 200,75 Q 300,100 400,80 Q 500,95 600,75"/>
    <path d="M 250,70 Q 350,110 450,85 Q 550,105 650,70"/>
    <path d="M 300,75 L 350,120 L 400,80 L 450,115 L 500,75"/>
    <path d="M 180,85 Q 250,130 320,90 Q 390,125 460,85"/>
    <path d="M 400,70 Q 450,120 500,80 Q 550,110 600,75"/>
  </g>

  <!-- XARITHEL position (center of bridge) -->
  <g transform="translate(400,250)" filter="url(#shadow)">
    <!-- Spider body -->
    <ellipse cx="0" cy="0" rx="16" ry="12" fill="#4a2060" stroke="#7040a0" stroke-width="2"/>
    <!-- Legs -->
    <g stroke="#3a1850" stroke-width="1.5">
      <line x1="-12" y1="-8" x2="-25" y2="-18"/><line x1="12" y1="-8" x2="25" y2="-18"/>
      <line x1="-14" y1="-3" x2="-28" y2="-8"/><line x1="14" y1="-3" x2="28" y2="-8"/>
      <line x1="-14" y1="3" x2="-28" y2="8"/><line x1="14" y1="3" x2="28" y2="8"/>
      <line x1="-12" y1="8" x2="-25" y2="18"/><line x1="12" y1="8" x2="25" y2="18"/>
    </g>
    <!-- Humanoid torso -->
    <ellipse cx="0" cy="-10" rx="8" ry="10" fill="#6a5a7a" stroke="#8a7a9a" stroke-width="1"/>
    <!-- Eyes -->
    <circle cx="-3" cy="-14" r="2" fill="#c060ff"/><circle cx="3" cy="-14" r="2" fill="#c060ff"/>
  </g>
  <text x="400" y="310" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#c0a0e0" font-weight="bold">XARITHEL</text>
  <text x="400" y="322" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#aa80cc" font-style="italic">Drider — CR 6 — AC 19 — HP 123</text>
  <text x="400" y="334" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#8a6aaa" font-style="italic">Spider Climb — pode atacar do teto</text>

  <!-- Rune on Xarithel's back indicator -->
  <g transform="translate(460,240)">
    <line x1="0" y1="0" x2="30" y2="-20" stroke="#aa3030" stroke-width="0.8" stroke-dasharray="2,2"/>
    <rect x="30" y="-32" width="70" height="16" rx="2" fill="#2a1020" stroke="#aa3030" stroke-width="0.5"/>
    <text x="65" y="-21" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#ee6060">Runa de sangue</text>
  </g>

  <!-- Legend -->
  <g transform="translate(20,390)">
    <rect x="0" y="0" width="180" height="85" rx="3" fill="#1a1520" fill-opacity="0.95" stroke="#5a4a5a" stroke-width="1"/>
    <text x="90" y="15" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#c0a0e0" font-weight="bold">NOTAS TATICAS</text>
    <line x1="5" y1="20" x2="175" y2="20" stroke="#5a4a5a" stroke-width="0.5"/>
    <text x="10" y="33" font-family="Georgia, serif" font-size="7" fill="#a090a0">Ponte: 9m x 3m, abismo 30m</text>
    <text x="10" y="45" font-family="Georgia, serif" font-size="7" fill="#a090a0">Queda: 10d6 dano</text>
    <text x="10" y="57" font-family="Georgia, serif" font-size="7" fill="#a090a0">Teias nas bordas: terreno dificil</text>
    <text x="10" y="69" font-family="Georgia, serif" font-size="7" fill="#aa6060">Quebrar pacto: Dispel Magic DC 16</text>
    <text x="10" y="79" font-family="Georgia, serif" font-size="7" fill="#aa6060">ou Remove Curse (toque)</text>
  </g>

  <!-- Abyss label -->
  <text x="400" y="400" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#3a2a4a" font-weight="bold" letter-spacing="8" opacity="0.4">A B I S M O</text>
</svg>