<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 650" width="800" height="650">
  <defs>
    <filter id="shadow"><feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#1a1a2a" flood-opacity="0.5"/></filter>
    <pattern id="stone" patternUnits="userSpaceOnUse" width="20" height="20">
      <rect width="20" height="20" fill="#3a3a3a"/>
      <rect x="0" y="0" width="10" height="10" fill="#353535" stroke="#2a2a2a" stroke-width="0.3"/>
      <rect x="10" y="10" width="10" height="10" fill="#353535" stroke="#2a2a2a" stroke-width="0.3"/>
    </pattern>
    <pattern id="floor" patternUnits="userSpaceOnUse" width="16" height="16">
      <rect width="16" height="16" fill="#5a5550"/>
      <rect x="0" y="0" width="8" height="8" fill="#585450" stroke="#4a4540" stroke-width="0.2"/>
      <rect x="8" y="8" width="8" height="8" fill="#585450" stroke="#4a4540" stroke-width="0.2"/>
    </pattern>
    <radialGradient id="runeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4060ff" stop-opacity="0.3"/><stop offset="100%" stop-color="#4060ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background (solid rock) -->
  <rect width="800" height="650" fill="url(#stone)"/>
  <!-- Border -->
  <rect x="0" y="0" width="800" height="650" fill="none" stroke="#5a4a3a" stroke-width="8"/>
  <rect x="4" y="4" width="792" height="642" fill="none" stroke="#7a6a5a" stroke-width="1"/>
  <!-- Title -->
  <rect x="200" y="10" width="400" height="38" rx="3" fill="#1a1a2a" opacity="0.9"/>
  <rect x="202" y="12" width="396" height="34" rx="2" fill="none" stroke="#6080c0" stroke-width="0.8"/>
  <text x="400" y="34" text-anchor="middle" font-family="Georgia, serif" font-size="18" fill="#a0b8e0" font-weight="bold" letter-spacing="2">RUINAS DE AELINDOR — NIVEL 1</text>
  <text x="400" y="43" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#6080a0" letter-spacing="1">ATO 3 — ENTRADA DAS RUINAS</text>

  <!-- ESCADARIA (entrance from surface) -->
  <g transform="translate(400,95)">
    <rect x="-25" y="-15" width="50" height="30" fill="url(#floor)" stroke="#4a4a4a" stroke-width="1.5"/>
    <!-- Steps -->
    <line x1="-20" y1="-10" x2="20" y2="-10" stroke="#6a6a6a" stroke-width="0.8"/>
    <line x1="-18" y1="-5" x2="18" y2="-5" stroke="#6a6a6a" stroke-width="0.8"/>
    <line x1="-16" y1="0" x2="16" y2="0" stroke="#6a6a6a" stroke-width="0.8"/>
    <line x1="-14" y1="5" x2="14" y2="5" stroke="#6a6a6a" stroke-width="0.8"/>
    <line x1="-12" y1="10" x2="12" y2="10" stroke="#6a6a6a" stroke-width="0.8"/>
    <!-- Arrow up -->
    <polygon points="0,-25 6,-18 -6,-18" fill="#8a8a6a" opacity="0.6"/>
    <text x="0" y="-28" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#8a8a6a">Superficie</text>
  </g>

  <!-- CORRIDOR from stairs to Sala de Entrada -->
  <rect x="385" y="110" width="30" height="40" fill="url(#floor)" stroke="#4a4a4a" stroke-width="1"/>

  <!-- SALA DE ENTRADA (circular room) -->
  <g transform="translate(400,200)">
    <circle cx="0" cy="0" r="55" fill="url(#floor)" stroke="#5a5a5a" stroke-width="2"/>
    <!-- Mosaic on ceiling (decorative) -->
    <circle cx="0" cy="0" r="45" fill="none" stroke="#6080a0" stroke-width="0.5" stroke-dasharray="3,2" opacity="0.4"/>
    <circle cx="0" cy="0" r="30" fill="none" stroke="#6080a0" stroke-width="0.3" opacity="0.3"/>
    <!-- Pedestal -->
    <circle cx="0" cy="0" r="8" fill="#6a6a5a" stroke="#8a8a7a" stroke-width="1"/>
    <circle cx="0" cy="0" r="4" fill="#4a4a3a" stroke="#6a6a5a" stroke-width="0.5"/>
    <!-- Rune glow on walls -->
    <circle cx="-50" cy="0" r="6" fill="url(#runeGlow)"/>
    <circle cx="50" cy="0" r="6" fill="url(#runeGlow)"/>
    <circle cx="0" cy="-50" r="6" fill="url(#runeGlow)"/>
  </g>
  <text x="400" y="205" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#a0b8e0" font-weight="bold">SALA DE ENTRADA</text>
  <text x="400" y="215" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#8090a0" font-style="italic">Pedestal vazio - mosaico estelar</text>

  <!-- CORREDOR ESQUERDO -->
  <g transform="translate(280,230)">
    <rect x="-60" y="-12" width="60" height="24" fill="url(#floor)" stroke="#4a4a4a" stroke-width="1"/>
    <!-- Dart trap indicator -->
    <g opacity="0.6">
      <line x1="-30" y1="-12" x2="-30" y2="12" stroke="#aa3030" stroke-width="1" stroke-dasharray="2,2"/>
      <text x="-30" y="20" text-anchor="middle" font-family="Georgia, serif" font-size="6" fill="#aa3030">DARDOS</text>
    </g>
  </g>

  <!-- CORREDOR DIREITO -->
  <g transform="translate(520,230)">
    <rect x="0" y="-12" width="60" height="24" fill="url(#floor)" stroke="#4a4a4a" stroke-width="1"/>
  </g>

  <!-- SALA DAS ARMADURAS (left) -->
  <g transform="translate(155,250)">
    <rect x="-55" y="-50" width="110" height="100" rx="3" fill="url(#floor)" stroke="#5a5a5a" stroke-width="2"/>
    <!-- Armor stands (8 positions, 2 highlighted) -->
    <g fill="#7a7a6a" stroke="#5a5a4a" stroke-width="0.5">
      <rect x="-45" y="-40" width="8" height="14" rx="1"/><rect x="-30" y="-40" width="8" height="14" rx="1"/>
      <rect x="-15" y="-40" width="8" height="14" rx="1"/><rect x="0" y="-40" width="8" height="14" rx="1"/>
      <rect x="15" y="-40" width="8" height="14" rx="1"/><rect x="30" y="-40" width="8" height="14" rx="1"/>
    </g>
    <!-- Animated armors (highlighted) -->
    <rect x="-45" y="20" width="10" height="16" rx="1" fill="#c0c0a0" stroke="#e0e0c0" stroke-width="1.5"/>
    <text x="-40" y="45" text-anchor="middle" font-family="Georgia, serif" font-size="6" fill="#e0e0c0">!</text>
    <rect x="35" y="20" width="10" height="16" rx="1" fill="#c0c0a0" stroke="#e0e0c0" stroke-width="1.5"/>
    <text x="40" y="45" text-anchor="middle" font-family="Georgia, serif" font-size="6" fill="#e0e0c0">!</text>
  </g>
  <text x="155" y="260" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#a0b8e0" font-weight="bold">SALA DAS</text>
  <text x="155" y="272" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#a0b8e0" font-weight="bold">ARMADURAS</text>
  <text x="155" y="283" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#aa6060" font-style="italic">2 Animated Armor</text>

  <!-- SALA DAS RUNAS (right) - hexagonal -->
  <g transform="translate(645,250)">
    <polygon points="0,-55 48,-28 48,28 0,55 -48,28 -48,-28" fill="url(#floor)" stroke="#5a5a5a" stroke-width="2"/>
    <!-- Rune positions on walls -->
    <g fill="url(#runeGlow)">
      <circle cx="0" cy="-48" r="8"/><circle cx="42" cy="-22" r="8"/><circle cx="42" cy="22" r="8"/>
      <circle cx="0" cy="48" r="8"/><circle cx="-42" cy="22" r="8"/><circle cx="-42" cy="-22" r="8"/>
    </g>
    <!-- Rune symbols -->
    <text x="0" y="-44" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#80a0ff">&#9733;</text>
    <text x="40" y="-18" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#80a0ff">&#9790;</text>
    <text x="40" y="26" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#80a0ff">&#9788;</text>
    <text x="0" y="52" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#80a0ff">&#9679;</text>
    <text x="-40" y="26" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#80a0ff">&#9681;</text>
    <text x="-40" y="-18" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#80a0ff">&#9813;</text>
    <!-- Sealed door -->
    <rect x="-10" y="48" width="20" height="6" rx="1" fill="#6a5a4a" stroke="#8a7a6a" stroke-width="1"/>
  </g>
  <text x="645" y="250" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#a0b8e0" font-weight="bold">SALA DAS</text>
  <text x="645" y="262" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#a0b8e0" font-weight="bold">RUNAS</text>
  <text x="645" y="273" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#8090a0" font-style="italic">Puzzle - 6 runas elficas</text>

  <!-- Secret room behind rune door -->
  <g transform="translate(645,340)">
    <rect x="-20" y="-10" width="40" height="25" rx="2" fill="url(#floor)" stroke="#5a5a5a" stroke-width="1" stroke-dasharray="3,2"/>
    <text x="0" y="4" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#c0a040">LOOT</text>
  </g>

  <!-- CORRIDORS converging to Sala Central -->
  <!-- Left corridor down -->
  <g>
    <rect x="130" y="300" width="24" height="80" fill="url(#floor)" stroke="#4a4a4a" stroke-width="1"/>
    <path d="M 154,380 Q 200,420 280,420" stroke="none" fill="url(#floor)"/>
    <rect x="154" y="395" width="130" height="24" fill="url(#floor)" stroke="#4a4a4a" stroke-width="1"/>
  </g>
  <!-- Right corridor down -->
  <g>
    <rect x="645" y="305" width="24" height="70" fill="url(#floor)" stroke="#4a4a4a" stroke-width="1"/>
    <rect x="470" y="395" width="200" height="24" fill="url(#floor)" stroke="#4a4a4a" stroke-width="1"/>
  </g>

  <!-- SALA CENTRAL -->
  <g transform="translate(400,460)">
    <rect x="-90" y="-40" width="180" height="90" rx="4" fill="url(#floor)" stroke="#5a5a5a" stroke-width="2"/>
    <!-- Mosaic floor -->
    <line x1="0" y1="-38" x2="0" y2="48" stroke="#4a5a4a" stroke-width="0.5" opacity="0.3"/>
    <rect x="-85" y="-35" width="85" height="80" rx="2" fill="none" stroke="#3a6a3a" stroke-width="0.5" opacity="0.2"/>
    <rect x="0" y="-35" width="85" height="80" rx="2" fill="none" stroke="#6a3a6a" stroke-width="0.5" opacity="0.2"/>
    <text x="-42" y="-20" text-anchor="middle" font-family="Georgia, serif" font-size="6" fill="#4a6a4a" opacity="0.5">Floresta</text>
    <text x="42" y="-20" text-anchor="middle" font-family="Georgia, serif" font-size="6" fill="#6a4a6a" opacity="0.5">Feywild</text>
    <!-- Enemy positions -->
    <circle cx="-30" cy="0" r="5" fill="#aa3030" opacity="0.6"/><text x="-30" y="3" text-anchor="middle" font-family="Georgia, serif" font-size="5" fill="#fff">CF</text>
    <circle cx="0" cy="-10" r="5" fill="#aa3030" opacity="0.6"/><text x="0" y="-7" text-anchor="middle" font-family="Georgia, serif" font-size="5" fill="#fff">CF</text>
    <circle cx="30" cy="0" r="5" fill="#aa3030" opacity="0.6"/><text x="30" y="3" text-anchor="middle" font-family="Georgia, serif" font-size="5" fill="#fff">CF</text>
    <circle cx="-50" cy="15" r="3" fill="#cc5050" opacity="0.5"/><circle cx="-35" cy="20" r="3" fill="#cc5050" opacity="0.5"/>
    <circle cx="35" cy="20" r="3" fill="#cc5050" opacity="0.5"/><circle cx="50" cy="15" r="3" fill="#cc5050" opacity="0.5"/>
  </g>
  <text x="400" y="455" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#a0b8e0" font-weight="bold">SALA CENTRAL</text>
  <text x="400" y="465" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#aa6060" font-style="italic">3 Cult Fanatics + 4 Cultistas</text>

  <!-- ESCADARIA PARA NIVEL 2 -->
  <g transform="translate(400,565)">
    <rect x="-20" y="-10" width="40" height="25" fill="url(#floor)" stroke="#5a5a5a" stroke-width="1.5"/>
    <line x1="-15" y1="-5" x2="15" y2="-5" stroke="#6a6a6a" stroke-width="0.8"/>
    <line x1="-13" y1="0" x2="13" y2="0" stroke="#6a6a6a" stroke-width="0.8"/>
    <line x1="-11" y1="5" x2="11" y2="5" stroke="#6a6a6a" stroke-width="0.8"/>
    <line x1="-9" y1="10" x2="9" y2="10" stroke="#6a6a6a" stroke-width="0.8"/>
    <polygon points="0,22 6,15 -6,15" fill="#8080a0" opacity="0.6"/>
    <text x="0" y="35" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#8080a0">Nivel 2 - Salao dos Espelhos</text>
  </g>

  <!-- Connection line (stairs to sala de entrada) -->
  <rect x="393" y="110" width="14" height="35" fill="url(#floor)" stroke="#4a4a4a" stroke-width="0.5"/>

  <!-- Legend -->
  <g transform="translate(25,480)">
    <rect x="0" y="0" width="130" height="95" rx="3" fill="#2a2a2a" fill-opacity="0.9" stroke="#5a5a5a" stroke-width="1"/>
    <text x="65" y="15" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#a0b8e0" font-weight="bold">LEGENDA</text>
    <line x1="5" y1="20" x2="125" y2="20" stroke="#5a5a5a" stroke-width="0.5"/>
    <circle cx="15" cy="33" r="5" fill="#aa3030" opacity="0.6"/><text x="15" y="36" text-anchor="middle" font-family="Georgia, serif" font-size="5" fill="#fff">CF</text>
    <text x="28" y="36" font-family="Georgia, serif" font-size="7" fill="#c0b0a0">Cult Fanatic</text>
    <circle cx="15" cy="48" r="3" fill="#cc5050" opacity="0.5"/>
    <text x="28" y="51" font-family="Georgia, serif" font-size="7" fill="#c0b0a0">Cultista</text>
    <rect x="10" y="58" width="10" height="10" rx="1" fill="#c0c0a0" stroke="#e0e0c0" stroke-width="1"/>
    <text x="28" y="67" font-family="Georgia, serif" font-size="7" fill="#c0b0a0">Animated Armor</text>
    <line x1="10" y1="78" x2="20" y2="78" stroke="#aa3030" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="28" y="81" font-family="Georgia, serif" font-size="7" fill="#c0b0a0">Armadilha</text>
  </g>

  <!-- Grid scale -->
  <g transform="translate(630,590)">
    <text x="0" y="0" font-family="Georgia, serif" font-size="8" fill="#6a6a6a" font-style="italic">1 quadrado = ~1.5m (5ft)</text>
    <rect x="0" y="5" width="15" height="15" fill="none" stroke="#6a6a6a" stroke-width="0.5"/>
    <rect x="15" y="5" width="15" height="15" fill="none" stroke="#6a6a6a" stroke-width="0.5"/>
    <rect x="30" y="5" width="15" height="15" fill="none" stroke="#6a6a6a" stroke-width="0.5"/>
  </g>
</svg>