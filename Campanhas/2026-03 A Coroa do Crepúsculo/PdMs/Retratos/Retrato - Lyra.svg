<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" width="400" height="520">
  <defs>
    <radialGradient id="bgL" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#3a2a18"/><stop offset="100%" stop-color="#1a1208"/>
    </radialGradient>
    <radialGradient id="skinL" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#f0d8c0"/><stop offset="100%" stop-color="#e0c0a0"/>
    </radialGradient>
    <radialGradient id="warmLight" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#e0a040" stop-opacity="0.08"/><stop offset="100%" stop-color="#e0a040" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background (warm tavern glow) -->
  <rect width="400" height="520" fill="url(#bgL)"/>
  <rect width="400" height="520" fill="url(#warmLight)"/>
  <!-- Frame -->
  <rect x="8" y="8" width="384" height="504" rx="5" fill="none" stroke="#a08850" stroke-width="3"/>
  <rect x="14" y="14" width="372" height="492" rx="3" fill="none" stroke="#806830" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- BODY / APRON AND CLOTHES (smaller proportions - halfling) -->
  <g transform="translate(200,395)">
    <!-- Blouse (cream/white, practical) -->
    <path d="M -70,45 Q -80,10 -65,-15 Q -50,-30 -25,-38 L -10,-40 L 10,-40 L 25,-38 Q 50,-30 65,-15 Q 80,10 70,45 L 65,125 L -65,125 Z" fill="#c8b898" stroke="#a09070" stroke-width="0.8"/>
    <!-- Rolled up sleeves -->
    <path d="M -65,-15 Q -72,-5 -70,5" stroke="#a09070" stroke-width="1.5" fill="none"/>
    <path d="M 65,-15 Q 72,-5 70,5" stroke="#a09070" stroke-width="1.5" fill="none"/>
    <!-- Apron (beer-stained!) -->
    <path d="M -30,-10 L -35,125 L 35,125 L 30,-10 Z" fill="#d8d0c0" stroke="#b0a890" stroke-width="0.5"/>
    <!-- Beer stains on apron -->
    <g fill="#b09060" opacity="0.2">
      <ellipse cx="-10" cy="30" rx="8" ry="5"/><ellipse cx="12" cy="60" rx="6" ry="4"/>
      <ellipse cx="-5" cy="85" rx="7" ry="4"/><ellipse cx="8" cy="105" rx="5" ry="3"/>
    </g>
    <!-- Apron strings tied in front -->
    <path d="M -30,-10 Q -15,-14 0,-16 Q 15,-14 30,-10" stroke="#b0a890" stroke-width="1" fill="none"/>
    <path d="M -5,-16 Q -8,-8 -12,-2 Q -8,2 -3,0" stroke="#b0a890" stroke-width="1" fill="none"/>
    <path d="M 5,-16 Q 8,-8 12,-2 Q 8,2 3,0" stroke="#b0a890" stroke-width="1" fill="none"/>
    <!-- Pocket with cloth peeking out -->
    <rect x="-25" y="15" width="18" height="14" rx="2" fill="#c8c0b0" stroke="#a09880" stroke-width="0.5"/>
    <path d="M -22,15 Q -18,10 -14,15" stroke="#d0c8b8" stroke-width="1.5" fill="none"/>
  </g>

  <!-- DISH TOWEL on shoulder -->
  <g transform="translate(130,360)">
    <path d="M 0,0 Q -5,-5 -8,0 Q -12,10 -8,25 Q -5,35 0,40 Q 5,35 8,25 Q 12,10 8,0 Q 5,-5 0,0 Z" fill="#e0d8c8" stroke="#c0b8a0" stroke-width="0.5"/>
    <line x1="-2" y1="5" x2="-4" y2="15" stroke="#c8c0b0" stroke-width="0.3" opacity="0.5"/>
    <line x1="2" y1="5" x2="4" y2="15" stroke="#c8c0b0" stroke-width="0.3" opacity="0.5"/>
  </g>

  <!-- HANDS (holding a tankard) -->
  <g transform="translate(260,420)">
    <!-- Tankard -->
    <rect x="-10" y="-18" width="20" height="25" rx="3" fill="#6a5a30" stroke="#4a3a18" stroke-width="1"/>
    <rect x="-8" y="-16" width="16" height="21" rx="2" fill="#8a7a40" stroke="none"/>
    <!-- Beer foam -->
    <ellipse cx="0" cy="-16" rx="8" ry="3" fill="#f0e8d0" stroke="#d0c8a8" stroke-width="0.3"/>
    <!-- Handle -->
    <path d="M 10,-12 Q 18,-10 18,0 Q 18,8 10,8" stroke="#6a5a30" stroke-width="2.5" fill="none"/>
    <!-- Halfling hand on tankard -->
    <path d="M -12,-10 Q -15,-5 -12,0 Q -10,5 -8,0 Q -6,-5 -8,-10" fill="url(#skinL)" stroke="#d0b090" stroke-width="0.3"/>
  </g>

  <!-- NECK (short - halfling proportions) -->
  <path d="M 188,328 Q 190,335 192,340 L 208,340 Q 210,335 212,328" fill="url(#skinL)" stroke="none"/>

  <!-- HEAD (round, cheerful - halfling features) -->
  <g transform="translate(200,275)">
    <!-- Round face (halfling - rounder than human) -->
    <ellipse cx="0" cy="0" rx="45" ry="48" fill="url(#skinL)" stroke="#d0b090" stroke-width="0.5"/>

    <!-- HAIR (curly red!) -->
    <!-- Main hair mass -->
    <g fill="#b04020" stroke="#8a3018" stroke-width="0.3">
      <path d="M -42,-25 Q -48,-45 -25,-52 Q 0,-55 25,-52 Q 48,-45 42,-25 Q 35,-40 0,-43 Q -35,-40 -42,-25 Z"/>
      <!-- Curls! Lots of them -->
      <circle cx="-40" cy="-25" r="8"/><circle cx="-35" cy="-38" r="7"/><circle cx="-22" cy="-45" r="7"/>
      <circle cx="-8" cy="-48" r="7"/><circle cx="8" cy="-48" r="7"/><circle cx="22" cy="-45" r="7"/>
      <circle cx="35" cy="-38" r="7"/><circle cx="40" cy="-25" r="8"/>
      <!-- Side curls -->
      <circle cx="-45" cy="-15" r="7"/><circle cx="-46" cy="-3" r="6.5"/><circle cx="-44" cy="10" r="6"/>
      <circle cx="45" cy="-15" r="7"/><circle cx="46" cy="-3" r="6.5"/><circle cx="44" cy="10" r="6"/>
      <!-- Front curls (bangs) -->
      <circle cx="-28" cy="-35" r="6"/><circle cx="-15" cy="-40" r="5.5"/><circle cx="0" cy="-42" r="5.5"/>
      <circle cx="15" cy="-40" r="5.5"/><circle cx="28" cy="-35" r="6"/>
    </g>
    <!-- Curl highlights -->
    <g fill="#d06040" opacity="0.3">
      <circle cx="-38" cy="-28" r="3"/><circle cx="-20" cy="-44" r="2.5"/>
      <circle cx="8" cy="-46" r="2.5"/><circle cx="38" cy="-28" r="3"/>
      <circle cx="-44" cy="-8" r="2.5"/><circle cx="44" cy="-8" r="2.5"/>
    </g>

    <!-- FRECKLES (abundant!) -->
    <g fill="#b08060" opacity="0.35">
      <!-- Cheeks -->
      <circle cx="-22" cy="5" r="1"/><circle cx="-18" cy="3" r="0.8"/><circle cx="-25" cy="8" r="0.8"/>
      <circle cx="-15" cy="7" r="1"/><circle cx="-20" cy="10" r="0.7"/><circle cx="-26" cy="3" r="0.8"/>
      <circle cx="-12" cy="5" r="0.7"/><circle cx="-17" cy="12" r="0.8"/>
      <circle cx="22" cy="5" r="1"/><circle cx="18" cy="3" r="0.8"/><circle cx="25" cy="8" r="0.8"/>
      <circle cx="15" cy="7" r="1"/><circle cx="20" cy="10" r="0.7"/><circle cx="26" cy="3" r="0.8"/>
      <circle cx="12" cy="5" r="0.7"/><circle cx="17" cy="12" r="0.8"/>
      <!-- Nose bridge -->
      <circle cx="-3" cy="-2" r="0.6"/><circle cx="3" cy="-2" r="0.6"/><circle cx="0" cy="-4" r="0.6"/>
      <circle cx="-5" cy="0" r="0.5"/><circle cx="5" cy="0" r="0.5"/>
    </g>

    <!-- Eyebrows (arched, expressive) -->
    <path d="M -23,-16 Q -16,-21 -8,-18" stroke="#8a3018" stroke-width="1.2" fill="none"/>
    <path d="M 23,-16 Q 16,-21 8,-18" stroke="#8a3018" stroke-width="1.2" fill="none"/>

    <!-- EYES (bright green, perceptive, sparkling) -->
    <!-- Left eye -->
    <ellipse cx="-15" cy="-8" rx="8" ry="6" fill="#fff" stroke="#a09078" stroke-width="0.5"/>
    <circle cx="-15" cy="-8" r="4.5" fill="#2a8a3a"/>
    <circle cx="-15" cy="-8" r="2" fill="#0a3a10"/>
    <circle cx="-13" cy="-10" r="1.2" fill="#fff" opacity="0.7"/>
    <circle cx="-16" cy="-7" r="0.6" fill="#fff" opacity="0.4"/>
    <!-- Right eye -->
    <ellipse cx="15" cy="-8" rx="8" ry="6" fill="#fff" stroke="#a09078" stroke-width="0.5"/>
    <circle cx="15" cy="-8" r="4.5" fill="#2a8a3a"/>
    <circle cx="15" cy="-8" r="2" fill="#0a3a10"/>
    <circle cx="17" cy="-10" r="1.2" fill="#fff" opacity="0.7"/>
    <circle cx="14" cy="-7" r="0.6" fill="#fff" opacity="0.4"/>
    <!-- Smile lines near eyes -->
    <path d="M -24,-6 Q -26,-4 -25,-2" stroke="#d8b898" stroke-width="0.3" fill="none" opacity="0.5"/>
    <path d="M 24,-6 Q 26,-4 25,-2" stroke="#d8b898" stroke-width="0.3" fill="none" opacity="0.5"/>

    <!-- Nose (small, upturned - halfling) -->
    <path d="M 0,-3 Q -1,3 -3,8 Q -2,10 0,10 Q 2,10 3,8 Q 1,3 0,-3" stroke="#d0b090" stroke-width="0.5" fill="#eacab0"/>

    <!-- MOUTH (warm, welcoming smile) -->
    <path d="M -14,18 Q -7,25 0,24 Q 7,25 14,18" stroke="#b07060" stroke-width="1.2" fill="none"/>
    <!-- Upper lip -->
    <path d="M -12,19 Q -4,17 0,18 Q 4,17 12,19" stroke="#c08070" stroke-width="0.6" fill="none"/>
    <!-- Dimples -->
    <path d="M -16,17 Q -17,19 -16,21" stroke="#d8b898" stroke-width="0.4" fill="none" opacity="0.5"/>
    <path d="M 16,17 Q 17,19 16,21" stroke="#d8b898" stroke-width="0.4" fill="none" opacity="0.5"/>
  </g>

  <!-- Name plate -->
  <rect x="60" y="468" width="280" height="38" rx="4" fill="#2a1a08" opacity="0.9"/>
  <rect x="62" y="470" width="276" height="34" rx="3" fill="none" stroke="#a08850" stroke-width="0.8"/>
  <text x="200" y="490" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#e8d0a0" font-weight="bold" letter-spacing="2">LYRA</text>
  <text x="200" y="500" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#a08850" letter-spacing="1">A Estalajadeira — Halfling — 55 anos</text>
</svg>