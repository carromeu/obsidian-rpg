<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" width="400" height="520">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#2a3a5a"/><stop offset="100%" stop-color="#1a2030"/>
    </radialGradient>
    <linearGradient id="robeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3a5a8a"/><stop offset="50%" stop-color="#2a4a7a"/><stop offset="100%" stop-color="#3a5580"/>
    </linearGradient>
    <radialGradient id="skinTone" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#f0dcc8"/><stop offset="100%" stop-color="#e0c8b0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="520" fill="url(#bg)"/>
  <!-- Arcane ambient particles -->
  <g opacity="0.15" fill="#80a0e0">
    <circle cx="50" cy="100" r="1.5"/><circle cx="340" cy="80" r="1"/><circle cx="80" cy="350" r="1.2"/>
    <circle cx="320" cy="300" r="1.8"/><circle cx="150" cy="60" r="1"/><circle cx="280" cy="420" r="1.3"/>
    <circle cx="60" cy="250" r="0.8"/><circle cx="350" cy="180" r="1.5"/>
  </g>
  <!-- Frame -->
  <rect x="8" y="8" width="384" height="504" rx="5" fill="none" stroke="#8a7a50" stroke-width="3"/>
  <rect x="14" y="14" width="372" height="492" rx="3" fill="none" stroke="#6a5a40" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- BODY / ROBES -->
  <g transform="translate(200,380)">
    <!-- Shoulders and robe -->
    <path d="M -90,60 Q -100,20 -80,-10 Q -60,-35 -30,-45 L -15,-48 L 15,-48 L 30,-45 Q 60,-35 80,-10 Q 100,20 90,60 L 80,140 L -80,140 Z" fill="url(#robeGrad)" stroke="#1a3060" stroke-width="1"/>
    <!-- Robe folds -->
    <path d="M -20,-45 Q -15,10 -25,60 Q -30,100 -20,140" stroke="#1a3060" stroke-width="0.8" fill="none" opacity="0.4"/>
    <path d="M 20,-45 Q 15,10 25,60 Q 30,100 20,140" stroke="#1a3060" stroke-width="0.8" fill="none" opacity="0.4"/>
    <path d="M -50,-20 Q -45,30 -55,80" stroke="#1a3060" stroke-width="0.6" fill="none" opacity="0.3"/>
    <path d="M 50,-20 Q 45,30 55,80" stroke="#1a3060" stroke-width="0.6" fill="none" opacity="0.3"/>
    <!-- Collar -->
    <path d="M -15,-48 Q -5,-55 0,-60 Q 5,-55 15,-48" stroke="#c4a060" stroke-width="1.5" fill="none"/>
    <!-- Pockets (bulging with scrolls) -->
    <rect x="-70" y="10" width="22" height="16" rx="3" fill="#2a4070" stroke="#1a3060" stroke-width="0.5"/>
    <rect x="48" y="5" width="22" height="18" rx="3" fill="#2a4070" stroke="#1a3060" stroke-width="0.5"/>
    <!-- Scrolls poking out -->
    <line x1="-62" y1="8" x2="-58" y2="-2" stroke="#d4c8a0" stroke-width="2" stroke-linecap="round"/>
    <line x1="-55" y1="7" x2="-52" y2="-1" stroke="#c8b890" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="55" y1="3" x2="58" y2="-5" stroke="#d4c8a0" stroke-width="2" stroke-linecap="round"/>
    <line x1="62" y1="4" x2="64" y2="-3" stroke="#c8b890" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Gold trim on robe edges -->
    <path d="M -80,-10 Q -60,-35 -30,-45 L -15,-48" stroke="#c4a060" stroke-width="1" fill="none" opacity="0.6"/>
    <path d="M 80,-10 Q 60,-35 30,-45 L 15,-48" stroke="#c4a060" stroke-width="1" fill="none" opacity="0.6"/>
  </g>

  <!-- NECK -->
  <rect x="188" y="310" width="24" height="28" rx="5" fill="url(#skinTone)"/>

  <!-- HEAD -->
  <g transform="translate(200,260)">
    <!-- Face shape (thin, angular elven features) -->
    <ellipse cx="0" cy="0" rx="42" ry="55" fill="url(#skinTone)" stroke="#c0a890" stroke-width="0.5"/>
    <!-- Jaw (more angular) -->
    <path d="M -35,15 Q -25,50 0,58 Q 25,50 35,15" fill="url(#skinTone)" stroke="none"/>

    <!-- Ears (pointed, half-elf) -->
    <path d="M -42,-10 Q -55,-20 -52,-38 Q -48,-30 -42,-18" fill="#e8ccb0" stroke="#c0a890" stroke-width="0.5"/>
    <path d="M 42,-10 Q 55,-20 52,-38 Q 48,-30 42,-18" fill="#e8ccb0" stroke="#c0a890" stroke-width="0.5"/>

    <!-- HAIR (silver, pulled back in ponytail) -->
    <path d="M -38,-35 Q -40,-55 -20,-60 Q 0,-62 20,-60 Q 40,-55 38,-35" fill="#b8b8c0" stroke="#9898a0" stroke-width="0.5"/>
    <path d="M -35,-38 Q -30,-50 -10,-55 Q 10,-55 30,-50 Q 35,-38 35,-30" fill="#c8c8d0" stroke="none"/>
    <!-- Side hair strands -->
    <path d="M -40,-30 Q -44,-20 -42,-8" stroke="#a8a8b0" stroke-width="2" fill="none"/>
    <path d="M 40,-30 Q 44,-20 42,-8" stroke="#a8a8b0" stroke-width="2" fill="none"/>
    <!-- Ponytail (flowing behind) -->
    <path d="M 0,-55 Q 10,-58 15,-50 Q 25,-35 30,-10 Q 35,20 28,50 Q 22,70 25,90" stroke="#b0b0b8" stroke-width="5" fill="none" stroke-linecap="round"/>
    <path d="M 0,-55 Q 10,-57 14,-48 Q 23,-33 27,-8 Q 32,22 26,52" stroke="#c8c8d0" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>

    <!-- Eyebrows (thin, angular) -->
    <path d="M -22,-18 Q -15,-22 -8,-20" stroke="#8a8a90" stroke-width="1.2" fill="none"/>
    <path d="M 22,-18 Q 15,-22 8,-20" stroke="#8a8a90" stroke-width="1.2" fill="none"/>

    <!-- EYES (heterochromatic) -->
    <!-- Left eye - GREEN (elven) -->
    <ellipse cx="-15" cy="-10" rx="8" ry="6" fill="#fff" stroke="#a09080" stroke-width="0.5"/>
    <circle cx="-15" cy="-10" r="4" fill="#2a7a3a"/>
    <circle cx="-15" cy="-10" r="2" fill="#0a2a10"/>
    <circle cx="-13" cy="-12" r="1" fill="#fff" opacity="0.7"/>
    <!-- Right eye - BROWN (human) -->
    <ellipse cx="15" cy="-10" rx="8" ry="6" fill="#fff" stroke="#a09080" stroke-width="0.5"/>
    <circle cx="15" cy="-10" r="4" fill="#6a4a20"/>
    <circle cx="15" cy="-10" r="2" fill="#2a1a08"/>
    <circle cx="17" cy="-12" r="1" fill="#fff" opacity="0.7"/>

    <!-- GLASSES (round, scholarly) -->
    <circle cx="-15" cy="-10" r="11" fill="none" stroke="#8a7a50" stroke-width="1.2"/>
    <circle cx="15" cy="-10" r="11" fill="none" stroke="#8a7a50" stroke-width="1.2"/>
    <line x1="-4" y1="-10" x2="4" y2="-10" stroke="#8a7a50" stroke-width="1"/>
    <line x1="-26" y1="-10" x2="-38" y2="-14" stroke="#8a7a50" stroke-width="0.8"/>
    <line x1="26" y1="-10" x2="38" y2="-14" stroke="#8a7a50" stroke-width="0.8"/>
    <!-- Lens glint -->
    <path d="M -20,-15 Q -17,-17 -14,-15" stroke="#d0e0ff" stroke-width="0.5" fill="none" opacity="0.4"/>
    <path d="M 10,-15 Q 13,-17 16,-15" stroke="#d0e0ff" stroke-width="0.5" fill="none" opacity="0.4"/>

    <!-- Nose (thin, elegant) -->
    <path d="M 0,-8 Q -1,5 -3,12 Q 0,14 3,12" stroke="#c8b098" stroke-width="0.8" fill="none"/>

    <!-- Mouth (thin, contemplative) -->
    <path d="M -10,22 Q -3,26 0,25 Q 3,26 10,22" stroke="#b09080" stroke-width="1" fill="none"/>

    <!-- Wrinkles (age lines) -->
    <path d="M -28,5 Q -25,3 -22,5" stroke="#d0b8a0" stroke-width="0.4" fill="none" opacity="0.5"/>
    <path d="M 28,5 Q 25,3 22,5" stroke="#d0b8a0" stroke-width="0.4" fill="none" opacity="0.5"/>
    <path d="M -10,30 Q -5,32 0,31" stroke="#d0b8a0" stroke-width="0.3" fill="none" opacity="0.4"/>
  </g>

  <!-- HANDS (trembling, holding a scroll or lens) -->
  <g transform="translate(145,420)">
    <!-- Left hand with lens -->
    <path d="M 0,0 Q -5,10 -3,20 Q 0,25 5,20 Q 8,15 5,5 Z" fill="#e8ccb0" stroke="#c8b098" stroke-width="0.5"/>
    <!-- Trembling lines -->
    <g stroke="#a09080" stroke-width="0.3" opacity="0.4">
      <line x1="-4" y1="-2" x2="-6" y2="2"/><line x1="8" y1="-2" x2="10" y2="2"/>
    </g>
    <!-- Small magnifying lens -->
    <circle cx="0" cy="-5" r="8" fill="none" stroke="#8a7a50" stroke-width="1.5"/>
    <circle cx="0" cy="-5" r="7" fill="#d0e0f0" opacity="0.15"/>
    <line x1="6" y1="1" x2="12" y2="8" stroke="#8a7a50" stroke-width="1.5"/>
  </g>

  <!-- Arcane glow around hands -->
  <circle cx="145" cy="415" r="15" fill="#4060a0" opacity="0.08"/>

  <!-- Name plate -->
  <rect x="60" y="468" width="280" height="38" rx="4" fill="#1a1a2a" opacity="0.85"/>
  <rect x="62" y="470" width="276" height="34" rx="3" fill="none" stroke="#8a7a50" stroke-width="0.8"/>
  <text x="200" y="490" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#e0d0b0" font-weight="bold" letter-spacing="2">ELARION</text>
  <text x="200" y="500" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#a09070" letter-spacing="1">Sabio Elfico — Meio-Elfo — 187 anos</text>
</svg>