<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" width="400" height="520">
  <defs>
    <radialGradient id="bgM" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#2a1030"/><stop offset="100%" stop-color="#0a0510"/>
    </radialGradient>
    <radialGradient id="skinHag" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#6a7a90"/><stop offset="100%" stop-color="#4a5a70"/>
    </radialGradient>
    <radialGradient id="heartstoneGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8040a0" stop-opacity="0.6"/><stop offset="40%" stop-color="#6030a0" stop-opacity="0.3"/><stop offset="100%" stop-color="#4020a0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="eyeFireL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff80ff"/><stop offset="50%" stop-color="#c040c0"/><stop offset="100%" stop-color="#8020a0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="520" fill="url(#bgM)"/>
  <!-- Smoke wisps -->
  <g opacity="0.08" stroke="#8040a0" stroke-width="1.5" fill="none">
    <path d="M 50,500 Q 70,400 40,300 Q 60,200 80,100"/>
    <path d="M 350,500 Q 330,380 360,280 Q 340,180 320,80"/>
    <path d="M 200,520 Q 180,420 210,340 Q 190,260 200,160"/>
  </g>
  <!-- Frame -->
  <rect x="8" y="8" width="384" height="504" rx="5" fill="none" stroke="#6a3080" stroke-width="3"/>
  <rect x="14" y="14" width="372" height="492" rx="3" fill="none" stroke="#4a2060" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- BODY / TATTERED ROBES -->
  <g transform="translate(200,390)">
    <path d="M -95,50 Q -100,10 -75,-20 Q -55,-40 -25,-50 L -10,-52 L 10,-52 L 25,-50 Q 55,-40 75,-20 Q 100,10 95,50 L 85,130 L -85,130 Z" fill="#1a1020" stroke="#2a1830" stroke-width="1"/>
    <!-- Tattered edges -->
    <path d="M -85,130 Q -80,135 -75,128 Q -70,138 -65,130 Q -58,136 -50,128 Q -42,135 -35,130 Q -28,137 -20,128 Q -12,136 -5,130 Q 2,135 10,128 Q 18,137 25,130 Q 32,136 40,128 Q 48,135 55,130 Q 62,138 70,130 Q 78,135 85,130" stroke="#1a0818" stroke-width="0.8" fill="none"/>
    <!-- Robe folds -->
    <path d="M -15,-50 Q -10,0 -20,50 Q -25,90 -15,130" stroke="#2a1830" stroke-width="0.7" fill="none" opacity="0.5"/>
    <path d="M 15,-50 Q 10,0 20,50 Q 25,90 15,130" stroke="#2a1830" stroke-width="0.7" fill="none" opacity="0.5"/>
    <!-- V-neckline revealing heartstone -->
    <path d="M -10,-52 Q -5,-30 0,-15 Q 5,-30 10,-52" fill="#3a4a5a" stroke="#2a1830" stroke-width="0.5"/>
  </g>

  <!-- HEARTSTONE on chest -->
  <g transform="translate(200,370)">
    <circle cx="0" cy="0" r="18" fill="url(#heartstoneGlow)"/>
    <path d="M 0,-8 L 6,-2 L 4,6 L -4,6 L -6,-2 Z" fill="#200830" stroke="#6030a0" stroke-width="1.5"/>
    <path d="M 0,-6 L 4,-1 L 3,4 L -3,4 L -4,-1 Z" fill="#4020a0" opacity="0.6"/>
    <circle cx="0" cy="0" r="2" fill="#c080ff" opacity="0.7"/>
    <!-- Pulsing effect -->
    <circle cx="0" cy="0" r="10" fill="none" stroke="#8040a0" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- NECK -->
  <path d="M 185,318 Q 188,330 190,340 L 210,340 Q 212,330 215,318" fill="url(#skinHag)" stroke="none"/>

  <!-- HEAD -->
  <g transform="translate(200,260)">
    <!-- Face (gaunt, angular, inhuman) -->
    <path d="M -38,-40 Q -45,-10 -40,15 Q -30,48 0,58 Q 30,48 40,15 Q 45,-10 38,-40 Q 20,-55 0,-55 Q -20,-55 -38,-40 Z" fill="url(#skinHag)" stroke="#3a4a5a" stroke-width="0.5"/>
    <!-- Sunken cheeks -->
    <ellipse cx="-22" cy="15" rx="8" ry="12" fill="#4a5a68" opacity="0.3"/>
    <ellipse cx="22" cy="15" rx="8" ry="12" fill="#4a5a68" opacity="0.3"/>

    <!-- HAIR (wiry, twisted like dark wire) -->
    <g stroke="#2a2030" stroke-width="1.8" fill="none">
      <path d="M -35,-40 Q -50,-35 -60,-15 Q -70,10 -65,40 Q -62,60 -55,80"/>
      <path d="M -30,-45 Q -45,-40 -55,-20 Q -62,5 -58,35 Q -50,60 -48,75"/>
      <path d="M -20,-50 Q -40,-48 -50,-30 Q -55,-10 -50,15 Q -45,40 -40,55"/>
      <path d="M 35,-40 Q 50,-35 60,-15 Q 70,10 65,40 Q 62,60 55,80"/>
      <path d="M 30,-45 Q 45,-40 55,-20 Q 62,5 58,35 Q 50,60 48,75"/>
      <path d="M 20,-50 Q 40,-48 50,-30 Q 55,-10 50,15 Q 45,40 40,55"/>
      <path d="M -10,-52 Q -25,-55 -35,-50"/>
      <path d="M 10,-52 Q 25,-55 35,-50"/>
      <path d="M 0,-55 Q -10,-58 -25,-55"/>
      <path d="M 0,-55 Q 10,-58 25,-55"/>
    </g>
    <!-- Darker strands overlapping -->
    <g stroke="#1a1020" stroke-width="1" fill="none" opacity="0.6">
      <path d="M -25,-48 Q -42,-38 -52,-18 Q -58,8 -52,38"/>
      <path d="M 25,-48 Q 42,-38 52,-18 Q 58,8 52,38"/>
    </g>

    <!-- EYES (burning purple coals) -->
    <g>
      <!-- Eye sockets (deep, dark) -->
      <ellipse cx="-15" cy="-12" rx="12" ry="8" fill="#2a1830"/>
      <ellipse cx="15" cy="-12" rx="12" ry="8" fill="#2a1830"/>
      <!-- Burning irises -->
      <ellipse cx="-15" cy="-12" rx="7" ry="5" fill="url(#eyeFireL)"/>
      <ellipse cx="15" cy="-12" rx="7" ry="5" fill="url(#eyeFireL)"/>
      <!-- Vertical slit pupils -->
      <ellipse cx="-15" cy="-12" rx="2" ry="4.5" fill="#1a0020"/>
      <ellipse cx="15" cy="-12" rx="2" ry="4.5" fill="#1a0020"/>
      <!-- Glow -->
      <circle cx="-15" cy="-12" r="10" fill="#c060ff" opacity="0.08"/>
      <circle cx="15" cy="-12" r="10" fill="#c060ff" opacity="0.08"/>
      <!-- Highlights -->
      <circle cx="-13" cy="-14" r="1.2" fill="#fff" opacity="0.5"/>
      <circle cx="17" cy="-14" r="1.2" fill="#fff" opacity="0.5"/>
    </g>

    <!-- Nose (hooked, witch-like) -->
    <path d="M 0,-8 Q -3,2 -5,10 Q -6,14 -3,16 Q 0,17 3,16 Q 4,14 2,10" stroke="#5a6a78" stroke-width="0.8" fill="#5a6878"/>

    <!-- Mouth (cruel smile, sharp teeth) -->
    <path d="M -15,25 Q -8,30 0,28 Q 8,30 15,25" stroke="#4a3a50" stroke-width="1.2" fill="none"/>
    <!-- Teeth peeking -->
    <g fill="#c0c0a0" stroke="#8a8a70" stroke-width="0.3">
      <polygon points="-8,26 -6,30 -4,26"/>
      <polygon points="-2,27 0,31 2,27"/>
      <polygon points="4,26 6,30 8,26"/>
    </g>

    <!-- Wrinkles and age lines -->
    <g stroke="#4a5a68" stroke-width="0.4" fill="none" opacity="0.5">
      <path d="M -25,-22 Q -20,-25 -15,-22"/>
      <path d="M 25,-22 Q 20,-25 15,-22"/>
      <path d="M -30,5 Q -25,2 -20,5"/>
      <path d="M 30,5 Q 25,2 20,5"/>
      <path d="M -8,35 Q 0,38 8,35"/>
    </g>
  </g>

  <!-- CLAWS (black, long, menacing) -->
  <!-- Left hand -->
  <g transform="translate(115,430)">
    <path d="M 5,0 Q 0,12 2,25 Q 5,30 10,25 Q 13,18 10,8 Z" fill="#5a6878" stroke="#3a4a58" stroke-width="0.5"/>
    <!-- Black claws -->
    <line x1="0" y1="0" x2="-5" y2="-12" stroke="#1a1020" stroke-width="2" stroke-linecap="round"/>
    <line x1="3" y1="-2" x2="0" y2="-14" stroke="#1a1020" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="7" y1="-1" x2="6" y2="-13" stroke="#1a1020" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="11" y1="2" x2="12" y2="-10" stroke="#1a1020" stroke-width="1.6" stroke-linecap="round"/>
  </g>
  <!-- Right hand -->
  <g transform="translate(275,425)">
    <path d="M -5,0 Q 0,12 -2,25 Q -5,30 -10,25 Q -13,18 -10,8 Z" fill="#5a6878" stroke="#3a4a58" stroke-width="0.5"/>
    <line x1="0" y1="0" x2="5" y2="-12" stroke="#1a1020" stroke-width="2" stroke-linecap="round"/>
    <line x1="-3" y1="-2" x2="0" y2="-14" stroke="#1a1020" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-7" y1="-1" x2="-6" y2="-13" stroke="#1a1020" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="-11" y1="2" x2="-12" y2="-10" stroke="#1a1020" stroke-width="1.6" stroke-linecap="round"/>
  </g>

  <!-- Name plate -->
  <rect x="60" y="468" width="280" height="38" rx="4" fill="#1a0820" opacity="0.9"/>
  <rect x="62" y="470" width="276" height="34" rx="3" fill="none" stroke="#6a3080" stroke-width="0.8"/>
  <text x="200" y="490" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#d0a0e0" font-weight="bold" letter-spacing="2">MORVENNA</text>
  <text x="200" y="500" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#9070a0" letter-spacing="1">A Bruxa Noturna — Night Hag — Vila Principal</text>
</svg>