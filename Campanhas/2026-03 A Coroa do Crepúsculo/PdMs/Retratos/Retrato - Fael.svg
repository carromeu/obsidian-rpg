<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" width="400" height="520">
  <defs>
    <radialGradient id="bgF" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#2a3020"/><stop offset="100%" stop-color="#101810"/>
    </radialGradient>
    <radialGradient id="skinF" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#d8b890"/><stop offset="100%" stop-color="#c0a070"/>
    </radialGradient>
  </defs>
  <!-- Background (forest, dark) -->
  <rect width="400" height="520" fill="url(#bgF)"/>
  <!-- Subtle forest silhouettes -->
  <g opacity="0.05" fill="#2a4020">
    <path d="M 50,520 L 50,200 Q 45,180 50,160 Q 55,140 50,120 L 48,100 L 52,100 L 50,120 Q 55,140 58,160 Q 53,180 55,200 L 55,520 Z"/>
    <path d="M 350,520 L 350,180 Q 345,160 350,140 Q 355,120 350,100 L 348,80 L 352,80 L 350,100 Q 355,120 358,140 Q 353,160 355,180 L 355,520 Z"/>
  </g>
  <!-- Frame -->
  <rect x="8" y="8" width="384" height="504" rx="5" fill="none" stroke="#5a6a40" stroke-width="3"/>
  <rect x="14" y="14" width="372" height="492" rx="3" fill="none" stroke="#4a5a30" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- BODY / WORN LEATHER OUTFIT -->
  <g transform="translate(200,390)">
    <!-- Leather jacket/vest -->
    <path d="M -85,45 Q -90,10 -75,-15 Q -58,-35 -28,-45 L -12,-48 L 12,-48 L 28,-45 Q 58,-35 75,-15 Q 90,10 85,45 L 78,130 L -78,130 Z" fill="#5a4a30" stroke="#3a2a18" stroke-width="1"/>
    <!-- Leather texture/wear -->
    <g stroke="#3a2a18" stroke-width="0.4" fill="none" opacity="0.4">
      <path d="M -50,-25 Q -42,10 -48,50"/><path d="M 50,-25 Q 42,10 48,50"/>
      <path d="M -15,-45 Q -10,0 -18,40"/><path d="M 15,-45 Q 10,0 18,40"/>
    </g>
    <!-- Shirt underneath (open collar) -->
    <path d="M -12,-48 Q -5,-55 0,-58 Q 5,-55 12,-48 L 8,-30 Q 3,-35 0,-32 Q -3,-35 -8,-30 Z" fill="#8a8070" stroke="#6a6050" stroke-width="0.5"/>
    <!-- Worn patches -->
    <ellipse cx="-45" cy="15" rx="10" ry="8" fill="#4a3a22" opacity="0.3"/>
    <ellipse cx="52" cy="25" rx="8" ry="6" fill="#4a3a22" opacity="0.3"/>
    <!-- Belt with knife sheath -->
    <rect x="-70" y="50" width="140" height="8" rx="2" fill="#3a2a18" stroke="#2a1a10" stroke-width="0.8"/>
    <rect x="-3" y="48" width="8" height="12" rx="1" fill="#706040" stroke="#504030" stroke-width="0.5"/>
    <!-- Knife sheath at belt -->
    <g transform="translate(50,55)">
      <rect x="-4" y="0" width="8" height="28" rx="2" fill="#4a3a20" stroke="#3a2a10" stroke-width="0.5"/>
      <rect x="-3" y="-3" width="6" height="4" rx="1" fill="#6a5a30" stroke="#4a3a18" stroke-width="0.3"/>
    </g>
  </g>

  <!-- BOW (slung across back) -->
  <g transform="translate(120,340)" opacity="0.6">
    <path d="M 0,0 Q -15,-40 -8,-80 Q 0,-100 10,-80 Q 18,-40 5,0" stroke="#5a4020" stroke-width="3" fill="none"/>
    <line x1="-5" y1="-75" x2="3" y2="-2" stroke="#8a8070" stroke-width="0.8"/>
  </g>

  <!-- NECK -->
  <path d="M 186,320 Q 188,332 190,342 L 210,342 Q 212,332 214,320" fill="url(#skinF)" stroke="none"/>

  <!-- HEAD -->
  <g transform="translate(200,262)">
    <!-- Face (angular, weathered) -->
    <path d="M -38,-38 Q -45,-10 -40,12 Q -32,40 -15,48 Q 0,52 15,48 Q 32,40 40,12 Q 45,-10 38,-38 Q 22,-50 0,-50 Q -22,-50 -38,-38 Z" fill="url(#skinF)" stroke="#b09870" stroke-width="0.5"/>

    <!-- HAT (wide-brimmed, worn) -->
    <!-- Brim -->
    <ellipse cx="0" cy="-38" rx="55" ry="12" fill="#4a3a20" stroke="#3a2a10" stroke-width="1"/>
    <!-- Crown -->
    <path d="M -28,-42 Q -30,-60 -18,-68 Q 0,-72 18,-68 Q 30,-60 28,-42" fill="#5a4a28" stroke="#3a2a10" stroke-width="1"/>
    <path d="M -25,-44 Q -22,-58 -10,-63 Q 0,-65 10,-63 Q 22,-58 25,-44" fill="#6a5a30" stroke="none"/>
    <!-- Hat band -->
    <path d="M -28,-42 Q -15,-46 0,-47 Q 15,-46 28,-42" stroke="#3a2a10" stroke-width="2" fill="none"/>
    <!-- Wear/damage on hat -->
    <path d="M 30,-40 Q 35,-38 38,-42" stroke="#3a2a10" stroke-width="0.5" fill="none" opacity="0.5"/>
    <!-- Shadow from hat brim -->
    <path d="M -38,-35 Q -20,-30 0,-32 Q 20,-30 38,-35 Q 20,-28 0,-30 Q -20,-28 -38,-35 Z" fill="#6a5a40" opacity="0.3"/>

    <!-- HAIR (messy brown, sticking out under hat) -->
    <g fill="#5a3a18" stroke="#4a2a10" stroke-width="0.3">
      <path d="M -40,-32 Q -42,-22 -40,-12 Q -38,-5 -42,2"/>
      <path d="M -38,-28 Q -40,-18 -38,-10"/>
      <path d="M 40,-32 Q 42,-22 40,-12 Q 38,-5 42,2"/>
      <path d="M 38,-28 Q 40,-18 38,-10"/>
      <!-- Messy strands on forehead -->
      <path d="M -20,-35 Q -22,-28 -18,-25"/>
      <path d="M -10,-36 Q -12,-30 -8,-28"/>
      <path d="M 10,-36 Q 12,-30 8,-28"/>
      <path d="M 20,-35 Q 22,-28 18,-25"/>
    </g>

    <!-- STUBBLE (sparse beard) -->
    <g fill="#4a3a20" opacity="0.15">
      <circle cx="-18" cy="28" r="0.5"/><circle cx="-14" cy="30" r="0.5"/><circle cx="-10" cy="32" r="0.5"/>
      <circle cx="-6" cy="34" r="0.5"/><circle cx="0" cy="35" r="0.5"/><circle cx="6" cy="34" r="0.5"/>
      <circle cx="10" cy="32" r="0.5"/><circle cx="14" cy="30" r="0.5"/><circle cx="18" cy="28" r="0.5"/>
      <circle cx="-16" cy="33" r="0.5"/><circle cx="-8" cy="36" r="0.5"/><circle cx="0" cy="38" r="0.5"/>
      <circle cx="8" cy="36" r="0.5"/><circle cx="16" cy="33" r="0.5"/>
      <circle cx="-22" cy="22" r="0.5"/><circle cx="22" cy="22" r="0.5"/>
      <circle cx="-20" cy="25" r="0.5"/><circle cx="20" cy="25" r="0.5"/>
    </g>

    <!-- Eyebrows -->
    <path d="M -24,-18 Q -16,-22 -8,-19" stroke="#4a3018" stroke-width="1.3" fill="none"/>
    <path d="M 24,-18 Q 16,-22 8,-19" stroke="#4a3018" stroke-width="1.3" fill="none"/>

    <!-- EYES (tired, evasive, with deep dark circles) -->
    <!-- Dark circles (deep!) -->
    <ellipse cx="-15" cy="-8" rx="11" ry="8" fill="#a08868" opacity="0.35"/>
    <ellipse cx="15" cy="-8" rx="11" ry="8" fill="#a08868" opacity="0.35"/>
    <!-- Left eye (looking slightly away - evasive) -->
    <ellipse cx="-15" cy="-10" rx="7.5" ry="5" fill="#f0e8e0" stroke="#a09078" stroke-width="0.5"/>
    <circle cx="-17" cy="-10" r="3.5" fill="#5a4a30"/>
    <circle cx="-17" cy="-10" r="1.8" fill="#2a1a08"/>
    <circle cx="-15" cy="-12" r="0.8" fill="#fff" opacity="0.5"/>
    <!-- Right eye -->
    <ellipse cx="15" cy="-10" rx="7.5" ry="5" fill="#f0e8e0" stroke="#a09078" stroke-width="0.5"/>
    <circle cx="13" cy="-10" r="3.5" fill="#5a4a30"/>
    <circle cx="13" cy="-10" r="1.8" fill="#2a1a08"/>
    <circle cx="15" cy="-12" r="0.8" fill="#fff" opacity="0.5"/>
    <!-- Eyelids (half-closed, tired) -->
    <path d="M -23,-12 Q -15,-14 -7,-12" stroke="#c0a880" stroke-width="1" fill="url(#skinF)" opacity="0.3"/>
    <path d="M 23,-12 Q 15,-14 7,-12" stroke="#c0a880" stroke-width="1" fill="url(#skinF)" opacity="0.3"/>

    <!-- Nose -->
    <path d="M 0,-6 Q -2,4 -4,12 Q -3,15 0,15 Q 3,15 4,12 Q 2,4 0,-6" stroke="#b09870" stroke-width="0.5" fill="#d0b088"/>

    <!-- Mouth (thin, guarded) -->
    <path d="M -12,24 Q -4,27 0,26 Q 4,27 12,24" stroke="#a08060" stroke-width="1" fill="none"/>

    <!-- Sun/weather damage -->
    <g stroke="#b09870" stroke-width="0.3" fill="none" opacity="0.3">
      <path d="M -30,5 Q -27,3 -24,5"/><path d="M 30,5 Q 27,3 24,5"/>
    </g>
  </g>

  <!-- FAEL'S DOPPELGANGER HINT: faint gray distortion in his shadow -->
  <g opacity="0.04">
    <ellipse cx="200" cy="490" rx="80" ry="15" fill="#808090"/>
    <!-- The shadow face is featureless... -->
    <ellipse cx="200" cy="485" rx="20" ry="25" fill="#808090"/>
  </g>

  <!-- Name plate -->
  <rect x="60" y="468" width="280" height="38" rx="4" fill="#101810" opacity="0.9"/>
  <rect x="62" y="470" width="276" height="34" rx="3" fill="none" stroke="#5a6a40" stroke-width="0.8"/>
  <text x="200" y="490" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#c0d0a0" font-weight="bold" letter-spacing="2">FAEL</text>
  <text x="200" y="500" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#8a9a60" letter-spacing="1">O Guia — Doppelganger disfarc. — Traidor</text>
</svg>