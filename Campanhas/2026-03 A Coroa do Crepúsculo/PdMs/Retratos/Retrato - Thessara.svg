<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" width="400" height="520">
  <defs>
    <radialGradient id="bgT" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#1a2a1a"/><stop offset="100%" stop-color="#0a1808"/>
    </radialGradient>
    <radialGradient id="skinGreen" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#3a5a3a"/><stop offset="100%" stop-color="#2a4028"/>
    </radialGradient>
    <radialGradient id="eyeYellow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe040"/><stop offset="50%" stop-color="#c0a020"/><stop offset="100%" stop-color="#806010"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="520" fill="url(#bgT)"/>
  <!-- Mist -->
  <g opacity="0.06" fill="#80a060">
    <ellipse cx="100" cy="400" rx="120" ry="30"/><ellipse cx="300" cy="420" rx="100" ry="25"/>
    <ellipse cx="200" cy="450" rx="150" ry="20"/>
  </g>
  <!-- Frame -->
  <rect x="8" y="8" width="384" height="504" rx="5" fill="none" stroke="#4a6a30" stroke-width="3"/>
  <rect x="14" y="14" width="372" height="492" rx="3" fill="none" stroke="#3a5a20" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- BODY / SHAWL AND DRESS (disguise form - grandmotherly) -->
  <g transform="translate(200,385)">
    <!-- Plump body shape -->
    <path d="M -85,55 Q -95,15 -80,-15 Q -65,-35 -35,-45 L -15,-48 L 15,-48 L 35,-45 Q 65,-35 80,-15 Q 95,15 85,55 L 80,135 L -80,135 Z" fill="#6a4a30" stroke="#4a3020" stroke-width="1"/>
    <!-- Apron (flowery) -->
    <path d="M -30,-20 L -40,135 L 40,135 L 30,-20 Z" fill="#e8d8c0" stroke="#c0a880" stroke-width="0.5"/>
    <!-- Flower pattern on apron -->
    <g fill="#c06060" opacity="0.4">
      <circle cx="-10" cy="20" r="3"/><circle cx="10" cy="40" r="3"/><circle cx="-5" cy="65" r="3"/>
      <circle cx="15" cy="85" r="3"/><circle cx="-15" cy="100" r="3"/>
    </g>
    <g fill="#406040" opacity="0.3">
      <circle cx="-10" cy="20" r="5"/><circle cx="10" cy="40" r="5"/><circle cx="-5" cy="65" r="5"/>
    </g>
    <!-- Shawl over shoulders -->
    <path d="M -80,-15 Q -50,-30 -15,-48 Q 0,-55 15,-48 Q 50,-30 80,-15 Q 60,-5 40,10 Q 20,20 0,15 Q -20,20 -40,10 Q -60,-5 -80,-15 Z" fill="#8a6a40" stroke="#6a4a20" stroke-width="0.8" opacity="0.8"/>
    <!-- Shawl fringe -->
    <g stroke="#6a4a20" stroke-width="0.5" opacity="0.5">
      <line x1="-60" y1="-5" x2="-62" y2="5"/><line x1="-50" y1="2" x2="-52" y2="12"/><line x1="-40" y1="8" x2="-42" y2="18"/>
      <line x1="60" y1="-5" x2="62" y2="5"/><line x1="50" y1="2" x2="52" y2="12"/><line x1="40" y1="8" x2="42" y2="18"/>
    </g>
  </g>

  <!-- TEA CUP in hand -->
  <g transform="translate(275,410)">
    <ellipse cx="0" cy="0" rx="12" ry="8" fill="#c8b890" stroke="#a08860" stroke-width="0.8"/>
    <rect x="-10" y="-2" width="20" height="12" rx="3" fill="#c8b890" stroke="#a08860" stroke-width="0.8"/>
    <path d="M 10,2 Q 16,0 16,6 Q 16,10 10,10" stroke="#a08860" stroke-width="1" fill="none"/>
    <!-- Steam (green-tinted) -->
    <path d="M -3,-5 Q -5,-12 -2,-18 Q 0,-22 2,-18" stroke="#60a060" stroke-width="0.8" fill="none" opacity="0.4"/>
    <path d="M 3,-5 Q 5,-14 2,-20" stroke="#60a060" stroke-width="0.6" fill="none" opacity="0.3"/>
    <!-- Hand holding cup (plump, grandmotherly... but green hints underneath) -->
    <path d="M -15,5 Q -12,12 -5,14 Q 0,15 8,13 Q 14,10 15,5" fill="#e0c8a8" stroke="#c0a888" stroke-width="0.5"/>
    <!-- Green skin peeking through at fingertips -->
    <circle cx="-12" cy="8" r="2" fill="#5a7a5a" opacity="0.3"/>
    <circle cx="12" cy="8" r="2" fill="#5a7a5a" opacity="0.3"/>
  </g>

  <!-- NECK -->
  <path d="M 183,320 Q 186,332 188,340 L 212,340 Q 214,332 217,320" fill="#e8d0b0" stroke="none"/>

  <!-- HEAD (disguised form - plump, rosy, grandmotherly) -->
  <g transform="translate(200,265)">
    <!-- Round face -->
    <ellipse cx="0" cy="0" rx="48" ry="52" fill="#e8d0b0" stroke="#d0b898" stroke-width="0.5"/>
    <!-- Rosy cheeks -->
    <circle cx="-22" cy="10" r="10" fill="#d0a0a0" opacity="0.25"/>
    <circle cx="22" cy="10" r="10" fill="#d0a0a0" opacity="0.25"/>
    <!-- Double chin -->
    <path d="M -20,42 Q 0,52 20,42" stroke="#d0b898" stroke-width="0.5" fill="none" opacity="0.4"/>

    <!-- HAIR (gray, in a bun with loose strands) -->
    <path d="M -40,-30 Q -42,-50 -20,-55 Q 0,-58 20,-55 Q 42,-50 40,-30" fill="#a0a098" stroke="#8a8a80" stroke-width="0.5"/>
    <path d="M -35,-32 Q -28,-48 0,-52 Q 28,-48 35,-32" fill="#b0b0a8" stroke="none"/>
    <!-- Bun on top -->
    <ellipse cx="5" cy="-52" rx="18" ry="14" fill="#a0a098" stroke="#8a8a80" stroke-width="0.5"/>
    <path d="M -8,-58 Q 5,-68 18,-58" stroke="#8a8a80" stroke-width="0.5" fill="none"/>
    <!-- Loose strands -->
    <path d="M -42,-25 Q -48,-15 -45,-5" stroke="#9a9a90" stroke-width="1.5" fill="none"/>
    <path d="M 42,-25 Q 48,-15 45,-5" stroke="#9a9a90" stroke-width="1.5" fill="none"/>
    <!-- Hairpin (bone?) -->
    <line x1="-5" y1="-60" x2="18" y2="-45" stroke="#d0d0c0" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="-5" cy="-60" r="2" fill="#d0d0c0"/>

    <!-- EYES (warm but with something hungry underneath) -->
    <!-- Left eye -->
    <ellipse cx="-15" cy="-8" rx="8" ry="6" fill="#fff" stroke="#a09080" stroke-width="0.5"/>
    <circle cx="-15" cy="-8" r="4.5" fill="#6a8a40"/>
    <circle cx="-15" cy="-8" r="2" fill="#2a3a10"/>
    <circle cx="-13" cy="-10" r="1" fill="#fff" opacity="0.6"/>
    <!-- Right eye -->
    <ellipse cx="15" cy="-8" rx="8" ry="6" fill="#fff" stroke="#a09080" stroke-width="0.5"/>
    <circle cx="15" cy="-8" r="4.5" fill="#6a8a40"/>
    <circle cx="15" cy="-8" r="2" fill="#2a3a10"/>
    <circle cx="17" cy="-10" r="1" fill="#fff" opacity="0.6"/>
    <!-- The "hungry" glint - faint yellow behind the green -->
    <circle cx="-15" cy="-8" r="5" fill="#c0a020" opacity="0.08"/>
    <circle cx="15" cy="-8" r="5" fill="#c0a020" opacity="0.08"/>
    <!-- Crow's feet -->
    <g stroke="#c0a888" stroke-width="0.4" fill="none" opacity="0.5">
      <path d="M -24,-10 Q -27,-12 -30,-11"/><path d="M -24,-8 Q -28,-7 -31,-8"/><path d="M -24,-6 Q -27,-4 -30,-5"/>
      <path d="M 24,-10 Q 27,-12 30,-11"/><path d="M 24,-8 Q 28,-7 31,-8"/><path d="M 24,-6 Q 27,-4 30,-5"/>
    </g>

    <!-- Eyebrows (thin, gray) -->
    <path d="M -22,-16 Q -15,-19 -8,-17" stroke="#8a8a80" stroke-width="0.8" fill="none"/>
    <path d="M 22,-16 Q 15,-19 8,-17" stroke="#8a8a80" stroke-width="0.8" fill="none"/>

    <!-- Nose (slightly bulbous) -->
    <path d="M 0,-4 Q -2,5 -4,12 Q -5,16 0,17 Q 5,16 4,12 Q 2,5 0,-4" stroke="#c8b098" stroke-width="0.5" fill="#e0c8a8"/>

    <!-- Mouth (warm smile - but too wide?) -->
    <path d="M -16,24 Q -8,32 0,30 Q 8,32 16,24" stroke="#b08070" stroke-width="1.2" fill="none"/>
    <!-- Slight glint of too-sharp teeth -->
    <g fill="#e8e0d0" opacity="0.3">
      <rect x="-5" y="25" width="3" height="2" rx="0.5"/><rect x="2" y="25" width="3" height="2" rx="0.5"/>
    </g>

    <!-- Wart (subtle hint of true form) -->
    <circle cx="-18" cy="16" r="1.5" fill="#b8a080"/>

    <!-- Laugh lines -->
    <path d="M -22,15 Q -25,20 -22,25" stroke="#d0b898" stroke-width="0.4" fill="none" opacity="0.4"/>
    <path d="M 22,15 Q 25,20 22,25" stroke="#d0b898" stroke-width="0.4" fill="none" opacity="0.4"/>
  </g>

  <!-- TRUE FORM shadow behind (subtle, ghostly) -->
  <g opacity="0.06">
    <path d="M 150,210 Q 130,200 120,220 Q 110,250 120,290 Q 125,310 130,330" stroke="#2a5a2a" stroke-width="3" fill="none"/>
    <path d="M 250,210 Q 270,200 280,220 Q 290,250 280,290 Q 275,310 270,330" stroke="#2a5a2a" stroke-width="3" fill="none"/>
    <!-- Claw shapes -->
    <path d="M 120,290 L 108,285 L 105,278" stroke="#2a5a2a" stroke-width="2" fill="none"/>
    <path d="M 280,290 L 292,285 L 295,278" stroke="#2a5a2a" stroke-width="2" fill="none"/>
  </g>

  <!-- Name plate -->
  <rect x="60" y="468" width="280" height="38" rx="4" fill="#1a2a10" opacity="0.9"/>
  <rect x="62" y="470" width="276" height="34" rx="3" fill="none" stroke="#4a6a30" stroke-width="0.8"/>
  <text x="200" y="490" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#c0e0a0" font-weight="bold" letter-spacing="2">THESSARA</text>
  <text x="200" y="500" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#80a060" letter-spacing="1">A Bruxa Verde — Green Hag — Forma Ilusoria</text>
</svg>